                        <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
                            <div style={{ fontSize: '2.5rem', fontWeight: 800, background: 'linear-gradient(135deg, #3b82f6, #a855f7)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '0.5rem' }}>
                                JobBot
                            </div>
                            <p style={{ color: 'var(--muted)', fontSize: '0.9rem' }}>
                                {mode === 'reset' ? 'Set your new password' : mode === 'forgot' ? 'Enter your email to receive a reset link' : otpSent ? `Enter the code sent to ${email}` : mode === 'login' ? 'Welcome back! Sign in to continue.' : 'Create your account to get started.'}
                            </p>
                        </div>

                        {/* Reset password form (from email link) */}
                        {mode === 'reset' ? (
                            <form onSubmit={handleResetPassword}>
                                <div style={{ marginBottom: '1.5rem' }}>
                                    <label style={labelStyle}>New Password</label>
                                    <input style={styles.input} type="password" value={password} onChange={e => setPassword(e.target.value)}
                                           placeholder="Min 6 characters" required minLength={6} autoFocus />
                                </div>
                                <button type="submit" disabled={loading} style={{
                                    ...styles.btn, ...styles.btnPrimary, width: '100%', padding: '0.7rem', fontSize: '0.95rem', justifyContent: 'center',
                                }}>
                                    {loading ? 'Resetting...' : 'Reset Password'}
                                </button>
                                <button type="button" onClick={() => { setMode('login'); setResetToken(''); }}
                                    style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: '0.85rem', marginTop: '1rem', width: '100%', textAlign: 'center' }}>
                                    Back to Sign In
                                </button>
                            </form>

                        ) : mode === 'forgot' ? (
                            <form onSubmit={handleForgotPassword}>
                                <div style={{ marginBottom: '1.5rem' }}>
                                    <label style={labelStyle}>Email</label>
                                    <input style={styles.input} type="email" value={email} onChange={e => setEmail(e.target.value)}
                                           placeholder="you@example.com" required autoFocus />
                                </div>
                                <button type="submit" disabled={loading} style={{
                                    ...styles.btn, ...styles.btnPrimary, width: '100%', padding: '0.7rem', fontSize: '0.95rem', justifyContent: 'center',
                                }}>
                                    {loading ? 'Sending...' : 'Send Reset Link'}
                                </button>
                                <button type="button" onClick={() => setMode('login')}
                                    style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: '0.85rem', marginTop: '1rem', width: '100%', textAlign: 'center' }}>
                                    Back to Sign In
                                </button>
                            </form>

                        ) : otpSent ? (
                            <form onSubmit={handleSubmit}>
                                <div style={{ marginBottom: '1.5rem' }}>
                                    <label style={labelStyle}>Verification Code</label>
                                    <input style={{ ...styles.input, textAlign: 'center', fontSize: '1.5rem', letterSpacing: '0.3em', fontWeight: 700 }}
                                           value={otp} onChange={e => setOtp(e.target.value.replace(/\D/g, '').slice(0, 6))}
                                           placeholder="000000" required maxLength={6} autoFocus />
                                </div>
                                <button type="submit" disabled={loading || otp.length !== 6} style={{
                                    ...styles.btn, ...styles.btnPrimary, width: '100%', padding: '0.7rem', fontSize: '0.95rem',
                                    justifyContent: 'center', opacity: otp.length !== 6 ? 0.5 : 1,
                                }}>
                                    {loading ? 'Verifying...' : 'Verify & Create Account'}
                                </button>
                                <button type="button" onClick={() => { setOtpSent(false); setOtp(''); }}
                                    style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: '0.85rem', marginTop: '0.75rem', width: '100%', textAlign: 'center' }}>
                                    Back
                                </button>
                            </form>
                        ) : (
                            <React.Fragment>
                                {/* Google Sign In */}
                                <button onClick={googleLogin} style={{
                                    width: '100%', padding: '0.85rem', borderRadius: 10, border: '1px solid #475569',
                                    background: '#fff', color: '#1f2937', fontSize: '1rem', fontWeight: 600,
                                    cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    gap: '0.7rem', transition: 'all 0.15s', marginBottom: '1.5rem',
                                }}>
                                    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.13.76-4.59l-7.98-6.19A23.9 23.9 0 000 24c0 3.77.9 7.35 2.56 10.52l7.97-5.93z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.93C6.51 42.62 14.62 48 24 48z"/></svg>
                                    Continue with Google
                                </button>

                                {/* Divider */}
                                <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '1.5rem' }}>
                                    <div style={{ flex: 1, height: 1, background: 'var(--border)' }}></div>
                                    <span style={{ color: '#64748b', fontSize: '0.8rem' }}>or</span>
                                    <div style={{ flex: 1, height: 1, background: 'var(--border)' }}></div>
                                </div>

                                {/* Email/Password Form */}
                                <form onSubmit={handleSubmit}>
                                    {mode === 'signup' && (
                                        <div style={{ marginBottom: '1rem' }}>
                                            <label style={labelStyle}>Full Name</label>
                                            <input style={styles.input} value={name} onChange={e => setName(e.target.value)} placeholder="Your name" required />
                                        </div>
                                    )}
                                    <div style={{ marginBottom: '1rem' }}>
                                        <label style={labelStyle}>Email</label>
                                        <input style={styles.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" required />
                                    </div>
                                    <div style={{ marginBottom: '1.5rem' }}>
                                        <label style={labelStyle}>Password</label>
                                        <input style={styles.input} type="password" value={password} onChange={e => setPassword(e.target.value)}
                                               placeholder={mode === 'signup' ? 'Min 6 characters' : 'Your password'} required minLength={mode === 'signup' ? 6 : 1} />
                                        {mode === 'login' && (
                                            <button type="button" onClick={() => setMode('forgot')}
                                                style={{ background: 'none', border: 'none', color: '#60a5fa', cursor: 'pointer', fontSize: '0.82rem', float: 'right', marginTop: '0.3rem' }}>
                                                Forgot password?
                                            </button>
                                        )}
                                    </div>
                                    <button type="submit" disabled={loading} style={{
                                        ...styles.btn, ...styles.btnPrimary, width: '100%', padding: '0.7rem', fontSize: '0.95rem', justifyContent: 'center',
                                    }}>
                                        {loading ? 'Please wait...' : mode === 'login' ? 'Sign In' : 'Create Account'}
                                    </button>
                                </form>

                                {/* Google sign-in banner when email fails */}
                                {showGoogleBanner && (
                                    <div style={{ background: 'rgba(37,99,235,0.1)', border: '1px solid rgba(37,99,235,0.3)', borderRadius: 10, padding: '1rem', marginTop: '1rem', textAlign: 'center' }}>
                                        <p style={{ color: 'var(--text2)', fontSize: '0.88rem', margin: '0 0 0.75rem', lineHeight: 1.5 }}>
                                            Email verification is temporarily unavailable. Sign in with Google instead:
                                        </p>
                                        <button onClick={googleLogin} style={{
                                            width: '100%', padding: '0.7rem', borderRadius: 8, border: '1px solid #475569',
                                            background: '#fff', color: '#1f2937', fontSize: '0.9rem', fontWeight: 600,
                                            cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.6rem',
                                        }}>
                                            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.13.76-4.59l-7.98-6.19A23.9 23.9 0 000 24c0 3.77.9 7.35 2.56 10.52l7.97-5.93z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.93C6.51 42.62 14.62 48 24 48z"/></svg>
                                            Continue with Google
                                        </button>
                                    </div>
                                )}

                                <p style={{ textAlign: 'center', marginTop: '1.25rem', color: 'var(--muted)', fontSize: '0.88rem' }}>
                                    {mode === 'login' ? "Don't have an account? " : 'Already have an account? '}
                                    <button onClick={() => setMode(mode === 'login' ? 'signup' : 'login')}
                                        style={{ background: 'none', border: 'none', color: '#60a5fa', cursor: 'pointer', fontWeight: 600, fontSize: '0.88rem' }}>
                                        {mode === 'login' ? 'Sign Up' : 'Sign In'}
                                    </button>
                                </p>
                            </React.Fragment>
                        )}
                    </div>
                </div>
            );
        }

        // ============================================================
        // Profile Setup (Onboarding for new users)
        // ============================================================
        function ProfileSetup({ profile, setProfile, showToast, onComplete }) {
            const fileRef = useRef(null);
            const [uploading, setUploading] = useState(false);
            const [step, setStep] = useState(1); // 1 = upload, 2 = review

            const uploadResume = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                const fd = new FormData();
                fd.append('resume', file);
                try {
                    const res = await api.upload('/api/profile/upload-resume', fd);
                    if (res.error) { showToast(res.error, 'error'); }
                    else {
                        setProfile(res.profile);
                        showToast('Resume parsed successfully!', 'success');
                        setStep(2);
                    }
                } catch (err) { showToast('Upload failed', 'error'); }
                setUploading(false);
            };

            const cardStyle = { background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 16, padding: '2rem' };

            if (step === 2) {
                // Review parsed profile
                return (
                    <div style={{ maxWidth: 700, margin: '0 auto', padding: '2rem', animation: 'fadeIn 0.3s ease' }}>
                        <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
                            <h1 style={{ fontSize: '1.5rem', marginBottom: '0.3rem' }}>Review Your Profile</h1>
                            <p style={{ color: 'var(--muted)' }}>We parsed your resume. Review below and continue.</p>
                        </div>

                        <div style={cardStyle}>
                            <h2 style={{ margin: '0 0 0.2rem' }}>{profile.name}</h2>
                            <p style={{ color: '#60a5fa', marginBottom: '0.3rem' }}>{profile.title}</p>
                            <p style={{ color: 'var(--muted)', fontSize: '0.88rem', marginBottom: '1rem' }}>
                                {profile.location} | {profile.years_of_experience} yrs | {profile.email}
                            </p>
                            <p style={{ color: '#cbd5e1', lineHeight: 1.7, marginBottom: '1.5rem' }}>{profile.summary}</p>

                            {profile.skills && Object.keys(profile.skills).length > 0 && (
                                <div style={{ marginBottom: '1.5rem' }}>
                                    <h3 style={{ fontSize: '0.9rem', color: 'var(--muted)', marginBottom: '0.5rem' }}>Skills</h3>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.3rem' }}>
                                        {Object.values(profile.skills).flat().map((s, i) => (
                                            <span key={i} style={{ background: '#1e3a5f', color: '#93c5fd', padding: '0.25rem 0.7rem', borderRadius: 20, fontSize: '0.82rem' }}>{s}</span>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {(profile.experience || []).length > 0 && (
                                <div>
                                    <h3 style={{ fontSize: '0.9rem', color: 'var(--muted)', marginBottom: '0.5rem' }}>Experience ({profile.experience.length} roles)</h3>
                                    {profile.experience.map((exp, i) => (
                                        <div key={i} style={{ marginBottom: '0.75rem', paddingBottom: '0.75rem', borderBottom: i < profile.experience.length - 1 ? '1px solid var(--border)' : 'none' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap' }}>
                                                <strong style={{ color: 'var(--text)' }}>{exp.title}</strong>
                                                <span style={{ color: 'var(--muted)', fontSize: '0.82rem' }}>{exp.period}</span>
                                            </div>
                                            <p style={{ color: '#60a5fa', fontSize: '0.88rem' }}>{exp.company}</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Resume Score */}
                        {profile.resume_score && <ResumeScoreCard score={profile.resume_score} />}

                        {/* Fix Resume CTA — shown when score < 100 */}
                        {profile.resume_score && profile.resume_score.total_score < 100 && (
                            <ResumeOptimizer profile={profile} setProfile={setProfile} showToast={showToast} />
                        )}

                        <div style={{ display: 'flex', gap: '0.75rem', marginTop: '1.5rem', justifyContent: 'center' }}>
                            <button onClick={() => setStep(1)} style={{ ...styles.btn, ...styles.btnSecondary }}>Re-upload Resume</button>
                            <button onClick={onComplete}
                                style={{ ...styles.btn, ...styles.btnPrimary, padding: '0.7rem 2rem', fontSize: '1rem' }}>
                                Continue to Dashboard
                            </button>
                        </div>
                    </div>
                );
            }

            // Step 1: Upload resume
            return (
                <div style={{ maxWidth: 520, margin: '0 auto', padding: '2rem', animation: 'fadeIn 0.3s ease' }}>
                    <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
                        <div style={{ fontSize: '3rem', marginBottom: '0.5rem' }}>&#128196;</div>
                        <h1 style={{ fontSize: '1.5rem', marginBottom: '0.3rem' }}>Set Up Your Profile</h1>
                        <p style={{ color: 'var(--muted)', lineHeight: 1.6 }}>
                            Upload your resume to get started. We'll parse your skills,<br/>experience, and education automatically.
                        </p>
                    </div>

                    <div style={{ ...cardStyle, textAlign: 'center' }}>
                        <input ref={fileRef} type="file" accept=".pdf,.docx,.txt" onChange={uploadResume} style={{ display: 'none' }} />

                        <div style={{
                            border: '2px dashed #475569', borderRadius: 14, padding: '3rem 2rem',
                            cursor: 'pointer', transition: 'all 0.2s', marginBottom: '1rem',
                        }} onClick={() => !uploading && fileRef.current.click()}>
                            {uploading ? (
                                <div>
                                    <div style={{ fontSize: '1.5rem', marginBottom: '0.5rem', color: 'var(--accent2)' }}>Parsing...</div>
                                    <p style={{ color: 'var(--muted)', fontSize: '0.9rem' }}>Analyzing your resume with AI</p>
                                </div>
                            ) : (
                                <div>
                                    <div style={{ fontSize: '2.5rem', marginBottom: '0.5rem' }}>&#128195;</div>
                                    <p style={{ color: 'var(--text2)', fontWeight: 600, fontSize: '1rem', marginBottom: '0.3rem' }}>
                                        Click to upload your resume
                                    </p>
                                    <p style={{ color: 'var(--muted)', fontSize: '0.85rem' }}>PDF, DOCX, or TXT</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================
        // App (Router) — with auth
        // ============================================================
        function App() {
            const [user, setUser] = useState(null);
            const [authChecked, setAuthChecked] = useState(false);
            const [page, setPage] = useState('dashboard');
            const [pageArg, setPageArg] = useState(null);
            const [profile, setProfile] = useState({});
            const [toast, setToast] = useState(null);

            // Check session on mount
            useEffect(() => {
                api.get('/api/auth/me').then(res => {
                    if (res.user) {
                        setUser(res.user);
                        api.get('/api/profile').then(setProfile);
                    }
                    setAuthChecked(true);
                }).catch(() => setAuthChecked(true));

                // Handle Google OAuth redirect
                const params = new URLSearchParams(window.location.search);
                if (params.get('auth_success')) {
                    window.history.replaceState({}, '', '/');
                    api.get('/api/auth/me').then(res => {
                        if (res.user) { setUser(res.user); api.get('/api/profile').then(setProfile); }
                        setAuthChecked(true);
                    });
                }
                if (params.get('auth_error')) {
                    setToast({ message: 'Google sign-in failed. Please try again.', type: 'error' });
                    window.history.replaceState({}, '', '/');
                }

            }, []);

            const navigate = (p, arg = null) => { setPage(p); setPageArg(arg); window.scrollTo(0, 0); };
            const showToast = (message, type = 'success') => setToast({ message, type });

            const handleAuth = (userData) => {
                setUser(userData);
                api.get('/api/profile').then(setProfile);
                showToast(`Welcome, ${userData.name}!`, 'success');
            };

            const handleLogout = async () => {
                await api.post('/api/auth/logout', {});
                setUser(null);
                setProfile({});
                setPage('dashboard');
                showToast('Logged out', 'success');
            };

            const [setupDone, setSetupDone] = useState(false);
            const isProfileComplete = (p) => {
                if (setupDone) return true;
                if (!p) return false;
                // If user has uploaded resume before (has score or experience), profile is complete
                if (p.resume_score) return true;
                if (p.experience && p.experience.length > 0) return true;
                if (p.skills && Object.keys(p.skills).length > 0) return true;
                return false;
            };

            // Loading state
            if (!authChecked) {
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        <p style={{ color: 'var(--muted)', fontSize: '1.1rem' }}>Loading...</p>
                    </div>
                );
            }

            // Not logged in — show auth page
            if (!user) {
                return (
                    <div>
                        <AuthPage onAuth={handleAuth} showToast={showToast} />
                        {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                        <style>{`@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }`}</style>
                    </div>
                );
            }

            // Logged in but profile not set up — show onboarding
            if (!isProfileComplete(profile)) {
                return (
                    <div>
                        <div style={styles.navbar}>
                            <div style={{ ...styles.logo, cursor: 'pointer' }} onClick={() => navigate('dashboard')}>JobBot</div>
                            <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                                <span style={{ color: 'var(--muted)', fontSize: '0.85rem' }}>{user.name}</span>
                                <button onClick={handleLogout} style={{ ...styles.navLink, color: '#f87171', fontSize: '0.82rem' }}>Logout</button>
                            </div>
                        </div>
                        <ProfileSetup profile={profile} setProfile={setProfile} showToast={showToast} onComplete={() => setSetupDone(true)} />
                        {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                        <style>{`@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }`}</style>
                    </div>
                );
            }

            // Logged in + profile complete — show full app
            return (
                <div>
                    {/* Navbar */}
                    <div style={styles.navbar}>
                        <div style={{ ...styles.logo, cursor: 'pointer' }} onClick={() => navigate('dashboard')}>JobBot</div>
                        <nav style={{ display: 'flex', gap: '0.25rem', flex: 1 }}>
                            {[['dashboard', 'Dashboard'], ['jobs', 'Jobs'], ['search', 'Search'], ['profile', 'Profile']].map(([key, label]) => (
                                <button key={key} onClick={() => navigate(key)}
                                    style={{ ...styles.navLink, ...(page === key || (page === 'job' && key === 'jobs') ? styles.navActive : {}) }}>
                                    {label}
                                </button>
                            ))}
                        </nav>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem', marginLeft: 'auto' }}>
                            {/* Nav avatar */}
                            <div onClick={() => navigate('profile')} title="My Profile" style={{ cursor: 'pointer', width: 32, height: 32, borderRadius: '50%', flexShrink: 0, overflow: 'hidden', border: '2px solid var(--bg3)', transition: 'border-color 0.15s' }}
                                onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--accent2)'}
                                onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--bg3)'}>
                                {profile.avatar
                                    ? <img src={profile.avatar} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
                                    : <div style={{ width: '100%', height: '100%', background: 'linear-gradient(135deg,#2563eb,#7c3aed)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.8rem', fontWeight: 700, color: '#fff' }}>
                                        {(user.name || 'U')[0].toUpperCase()}
                                      </div>
                                }
                            </div>
                            <span className="hide-sm" style={{ color: 'var(--muted)', fontSize: '0.82rem' }}>{user.name}</span>
                            <button onClick={handleLogout} style={{ ...styles.navLink, color: '#f87171', fontSize: '0.8rem', padding: '0.35rem 0.6rem' }}>Logout</button>
                        </div>
                    </div>

                    {/* Page content */}
                    {page === 'dashboard' && <Dashboard navigate={navigate} />}
                    {page === 'jobs' && <Jobs navigate={navigate} showToast={showToast} />}
                    {page === 'job' && <JobDetail jobId={pageArg} navigate={navigate} showToast={showToast} />}
                    {page === 'search' && <Search profile={profile} showToast={showToast} navigate={navigate} />}
                    {page === 'profile' && <Profile profile={profile} setProfile={setProfile} showToast={showToast} />}

                    {/* Toast */}
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

                    <style>{`@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }`}</style>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
