                                                    <span style={{ color: 'var(--green2)', fontWeight: 700, fontSize: '1.1rem' }}>{fmtSalary}</span>
                                                    {currency !== 'USD' && <span style={{ color: 'var(--muted)', fontSize: '0.75rem', display: 'block' }}>{currency}</span>}
                                                </div>
                                            </div>
                                        ) : (
                                            <div style={{ background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 10, padding: '0.65rem 1rem', marginBottom: '1rem' }}>
                                                <span style={{ color: '#475569', fontSize: '0.88rem' }}>Salary not listed</span>
                                            </div>
                                        )}

                                        {/* Match score bar */}
                                        <div style={{ marginBottom: '1rem' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.3rem' }}>
                                                <span style={{ fontSize: '0.8rem', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Match Score</span>
                                                <span style={{ fontSize: '0.88rem', fontWeight: 700, color: j.score >= 0.7 ? 'var(--green2)' : j.score >= 0.4 ? 'var(--yellow2)' : 'var(--red2)' }}>{Math.round((j.score || 0) * 100)}%</span>
                                            </div>
                                            <div style={{ background: 'var(--bg3)', borderRadius: 6, height: 8, overflow: 'hidden' }}>
                                                <div style={{ height: '100%', borderRadius: 6, width: `${Math.round((j.score || 0) * 100)}%`, background: j.score >= 0.7 ? 'var(--green)' : j.score >= 0.4 ? 'var(--yellow)' : 'var(--red)', transition: 'width 0.4s' }} />
                                            </div>
                                            {j.score_details && (
                                                <div style={{ display: 'flex', gap: '1rem', marginTop: '0.4rem', fontSize: '0.78rem', color: 'var(--muted)' }}>
                                                    <span>Local: {Math.round((j.score_details.local_score || 0) * 100)}%</span>
                                                    {j.score_details.ai_score != null && <span>AI: {Math.round(j.score_details.ai_score * 100)}%</span>}
                                                </div>
                                            )}
                                        </div>

                                        {/* Job type / meta chips */}
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem', marginBottom: '1rem' }}>
                                            {j.job_type && <span style={{ background: 'var(--bg3)', color: 'var(--muted)', padding: '0.2rem 0.6rem', borderRadius: 20, fontSize: '0.78rem' }}>{j.job_type}</span>}
                                            {j.date_posted && <span style={{ background: 'var(--bg3)', color: 'var(--muted)', padding: '0.2rem 0.6rem', borderRadius: 20, fontSize: '0.78rem' }}>📅 {fmtDate(j.date_posted)}</span>}
                                            {reqYears && <span style={{ background: 'rgba(245,158,11,0.15)', color: '#fcd34d', padding: '0.2rem 0.6rem', borderRadius: 20, fontSize: '0.78rem', fontWeight: 600, border: '1px solid rgba(245,158,11,0.3)' }}>🎓 {reqYears}+ yrs exp required</span>}
                                        </div>

                                        {/* Tags */}
                                        {j.tags && j.tags.length > 0 && (
                                            <div style={{ marginBottom: '1rem' }}>
                                                <p style={{ fontSize: '0.78rem', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.4rem' }}>Skills & Tags</p>
                                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.35rem' }}>
                                                    {j.tags.map((t, i) => <span key={i} style={{ background: '#1e3a5f', color: '#93c5fd', padding: '0.2rem 0.6rem', borderRadius: 20, fontSize: '0.78rem' }}>{t}</span>)}
                                                </div>
                                            </div>
                                        )}

                                        {/* Key highlights from description */}
                                        {jobPanelLoading && <p style={{ color: 'var(--muted)', fontSize: '0.82rem', marginBottom: '1rem' }}>Loading full details…</p>}
                                        {descLines.length > 0 && (
                                            <div style={{ marginBottom: '1rem' }}>
                                                <p style={{ fontSize: '0.78rem', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.5rem' }}>Key Highlights</p>
                                                <ul style={{ paddingLeft: '1.2rem', lineHeight: 1.8, color: '#cbd5e1', fontSize: '0.88rem' }}>
                                                    {descLines.map((line, i) => <li key={i}>{line}.</li>)}
                                                </ul>
                                            </div>
                                        )}

                                        {/* Full description */}
                                        {j.description ? (
                                            <details style={{ marginBottom: '1rem' }} open={descLines.length === 0}>
                                                <summary style={{ cursor: 'pointer', color: 'var(--accent2)', fontSize: '0.85rem', marginBottom: '0.5rem', userSelect: 'none', fontWeight: 600 }}>
                                                    {descLines.length === 0 ? '📋 Job Description' : '📋 Full Description'}
                                                </summary>
                                                <div style={{ background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 8, padding: '0.75rem 1rem', fontSize: '0.85rem', lineHeight: 1.75, color: '#cbd5e1', whiteSpace: 'pre-wrap', maxHeight: 340, overflowY: 'auto' }}>
                                                    {j.description}
                                                </div>
                                            </details>
                                        ) : !jobPanelLoading && (
                                            <div style={{ background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 8, padding: '0.75rem 1rem', marginBottom: '1rem', color: 'var(--muted)', fontSize: '0.85rem' }}>
                                                No description available. <a href={j.url} target="_blank" rel="noopener" style={{ color: 'var(--accent2)' }}>View on job site ↗</a>
                                            </div>
                                        )}

                                        {/* Notes (if any) */}
                                        {j.notes && <div style={{ background: 'rgba(245,158,11,0.1)', border: '1px solid rgba(245,158,11,0.3)', borderRadius: 8, padding: '0.6rem 0.9rem', fontSize: '0.85rem', color: 'var(--yellow2)', marginBottom: '1rem' }}>{j.notes}</div>}

                                        {/* Interview details summary */}
                                        {j.interview_details?.date && (
                                            <div style={{ background: 'rgba(124,58,237,0.1)', border: '1px solid rgba(124,58,237,0.3)', borderRadius: 8, padding: '0.75rem 1rem', marginBottom: '0.75rem' }}>
                                                <p style={{ fontSize: '0.75rem', color: '#d8b4fe', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.35rem', fontWeight: 600 }}>Interview Scheduled</p>
                                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem 1.5rem', fontSize: '0.85rem', color: '#e2e8f0' }}>
                                                    {j.interview_details.round && <span><span style={{ color: 'var(--muted)' }}>Round: </span>{j.interview_details.round}</span>}
                                                    <span><span style={{ color: 'var(--muted)' }}>Date: </span>{j.interview_details.date}{j.interview_details.time ? ` at ${j.interview_details.time}` : ''}{j.interview_details.timezone ? ` ${j.interview_details.timezone}` : ''}</span>
                                                    {j.interview_details.platform && <span><span style={{ color: 'var(--muted)' }}>Via: </span>{j.interview_details.platform}</span>}
                                                    {j.interview_details.interviewer && <span><span style={{ color: 'var(--muted)' }}>With: </span>{j.interview_details.interviewer}</span>}
                                                </div>
                                                {j.interview_details.meeting_link && (
                                                    <a href={j.interview_details.meeting_link} target="_blank" rel="noopener" style={{ display: 'inline-block', marginTop: '0.5rem', fontSize: '0.82rem', color: '#a78bfa', textDecoration: 'none', fontWeight: 600 }}>🔗 Join Meeting →</a>
                                                )}
                                            </div>
                                        )}

                                        {/* Offer details summary */}
                                        {j.offer_details?.salary && (
                                            <div style={{ background: 'rgba(245,158,11,0.08)', border: '1px solid rgba(245,158,11,0.3)', borderRadius: 8, padding: '0.75rem 1rem', marginBottom: '0.75rem' }}>
                                                <p style={{ fontSize: '0.75rem', color: '#fde68a', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.35rem', fontWeight: 600 }}>Offer Received</p>
                                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem 1.5rem', fontSize: '0.85rem', color: '#e2e8f0' }}>
                                                    <span><span style={{ color: 'var(--muted)' }}>Salary: </span><strong style={{ color: '#86efac' }}>{j.offer_details.salary}</strong>{j.offer_details.currency ? ` ${j.offer_details.currency}` : ''}</span>
                                                    {j.offer_details.joining_date && <span><span style={{ color: 'var(--muted)' }}>Joining: </span>{j.offer_details.joining_date}</span>}
                                                    {j.offer_details.deadline && <span><span style={{ color: 'var(--muted)' }}>Deadline: </span>{j.offer_details.deadline}</span>}
                                                    {j.offer_details.location && <span><span style={{ color: 'var(--muted)' }}>Location: </span>{j.offer_details.location}</span>}
                                                </div>
                                                {j.offer_details.benefits && <p style={{ fontSize: '0.82rem', color: 'var(--muted)', marginTop: '0.35rem' }}>Benefits: {j.offer_details.benefits}</p>}
                                            </div>
                                        )}
                                    </div>

                                    {/* Action bar — always single row, buttons share space equally */}
                                    <div style={{ padding: '0.85rem 1rem', borderTop: '1px solid var(--border)', display: 'flex', gap: '0.4rem', background: 'var(--bg2)', position: 'sticky', bottom: 0 }}>
                                        <a href={j.url} target="_blank" rel="noopener" onClick={e => e.stopPropagation()}
                                            style={{ ...styles.btn, ...styles.btnPrimary, flex: 1, fontSize: '0.82rem', padding: '0.5rem 0.4rem', justifyContent: 'center', minWidth: 0, whiteSpace: 'nowrap' }}>↗ Open</a>
                                        <button onClick={() => openCoverLetter(j)}
                                            style={{ ...styles.btn, flex: 1, background: 'rgba(124,58,237,0.2)', color: '#c4b5fd', border: '1px solid rgba(124,58,237,0.4)', fontSize: '0.82rem', padding: '0.5rem 0.4rem', minWidth: 0, whiteSpace: 'nowrap' }}>
                                            {j.cover_letter ? '📄 Cover Letter' : '✨ Gen CL'}
                                        </button>
                                        {(j.status === 'interview' || j.status === 'offer' || j.status === 'applied') && (
                                            <button onClick={() => { setJobPanel(null); navigate(`job/${j.id}`); }}
                                                style={{ ...styles.btn, flex: 1, background: j.status === 'offer' ? 'rgba(245,158,11,0.15)' : 'rgba(124,58,237,0.15)', color: j.status === 'offer' ? '#fde68a' : '#d8b4fe', border: `1px solid ${j.status === 'offer' ? 'rgba(245,158,11,0.3)' : 'rgba(124,58,237,0.3)'}`, fontSize: '0.82rem', padding: '0.5rem 0.4rem', minWidth: 0, whiteSpace: 'nowrap' }}>
                                                {j.status === 'offer' ? '💰 Offer' : '📅 Interview'}
                                            </button>
                                        )}
                                        {tab !== 'applied' && tab !== 'not_interested' && (<>
                                            <button onClick={async () => { await api.post(`/api/jobs/${j.id}/status`, { status: 'applied' }); showToast('Marked as Applied!', 'success'); setJobPanel(null); loadJobs(); }}
                                                style={{ ...styles.btn, ...styles.btnSuccess, flex: 1, fontSize: '0.82rem', padding: '0.5rem 0.4rem', minWidth: 0, whiteSpace: 'nowrap' }}>✓ Applied</button>
                                            <button onClick={() => { setJobPanel(null); openNiModal(j); }}
                                                style={{ ...styles.btn, flex: 1, background: 'rgba(220,38,38,0.15)', color: 'var(--red2)', border: '1px solid rgba(220,38,38,0.3)', fontSize: '0.82rem', padding: '0.5rem 0.4rem', minWidth: 0, whiteSpace: 'nowrap' }}>✕ Skip</button>
                                        </>)}
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* Cover Letter Modal */}
                    {clModal && (
                        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)', zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1rem' }}
                            onClick={e => { if (e.target === e.currentTarget) setClModal(null); }}>
                            <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 12, width: '100%', maxWidth: 640, maxHeight: '88vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
                                {/* Header */}
                                <div style={{ padding: '0.85rem 0.75rem 0.85rem 1.5rem', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '0.5rem' }}>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <h3 style={{ fontSize: '1rem', marginBottom: '0.15rem' }}>Cover Letter</h3>
                                        <p style={{ color: 'var(--muted)', fontSize: '0.8rem', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{clModal.job.title} — {clModal.job.company}</p>
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', flexShrink: 0 }}>
                                        <button onClick={async () => {
                                            setClModal(m => ({ ...m, loading: true, letter: '' }));
                                            const res = await api.post(`/api/jobs/${clModal.job.id}/cover-letter`);
                                            setClModal(m => m ? { ...m, letter: res.cover_letter || '', loading: false } : m);
                                            setJobs(prev => prev.map(j => j.id === clModal.job.id ? { ...j, cover_letter: res.cover_letter } : j));
                                        }} disabled={clModal.loading} style={{ ...styles.btn, ...styles.btnSm, background: 'rgba(124,58,237,0.2)', color: '#c4b5fd', border: '1px solid rgba(124,58,237,0.4)', fontSize: '0.8rem' }}>
                                            {clModal.loading ? '…' : '↺ Regenerate'}
                                        </button>
                                        <button onClick={() => setClModal(null)} title="Close"
                                            style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: 30, height: 30, background: 'rgba(220,38,38,0.15)', border: '1px solid rgba(220,38,38,0.4)', borderRadius: 7, color: '#f87171', cursor: 'pointer', fontSize: '1.1rem', lineHeight: 1, flexShrink: 0, transition: 'background 0.15s' }}
                                            onMouseEnter={e => e.currentTarget.style.background='rgba(220,38,38,0.4)'}
                                            onMouseLeave={e => e.currentTarget.style.background='rgba(220,38,38,0.15)'}>×</button>
                                    </div>
                                </div>
                                {/* Body */}
                                <div style={{ flex: 1, overflowY: 'auto', padding: '1.25rem 1.5rem' }}>
                                    {clModal.loading ? (
                                        <div style={{ textAlign: 'center', padding: '3rem', color: 'var(--muted)' }}>
                                            <p style={{ marginBottom: '0.5rem' }}>Generating personalised cover letter with AI...</p>
                                            <p style={{ fontSize: '0.8rem' }}>Using your profile + job description</p>
                                        </div>
                                    ) : clModal.letter ? (
                                        <pre style={{ whiteSpace: 'pre-wrap', lineHeight: 1.8, fontSize: '0.9rem', color: '#e2e8f0', fontFamily: 'inherit' }}>{clModal.letter}</pre>
                                    ) : (
                                        <p style={{ color: 'var(--muted)', textAlign: 'center', padding: '2rem' }}>No cover letter yet — click Regenerate above.</p>
                                    )}
                                </div>
                                {/* Footer — action buttons only; modal closed via × in header */}
                                {!clModal.loading && clModal.letter && (
                                    <div style={{ padding: '0.75rem 1.5rem', borderTop: '1px solid var(--border)', display: 'flex', gap: '0.5rem' }}>
                                        <button onClick={() => copyCoverLetter(clModal.letter)} style={{ ...styles.btn, ...styles.btnPrimary, flex: 1 }}>📋 Copy to Clipboard</button>
                                        <button onClick={() => exportCoverLetterPdf(clModal.letter, clModal.job?.title, clModal.job?.company)}
                                            style={{ ...styles.btn, ...styles.btnSecondary, flex: 1 }}>⬇ Download PDF</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Missing Profile Fields Modal (auto-apply) */}
                    {missingModal && (
                        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)', zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1rem' }}>
                            <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 12, width: '100%', maxWidth: 480, overflow: 'hidden' }}>
                                <div style={{ padding: '1.25rem 1.5rem', borderBottom: '1px solid var(--border)', background: 'rgba(245,158,11,0.08)' }}>
                                    <h3 style={{ fontSize: '1rem', marginBottom: '0.25rem', color: 'var(--yellow2)' }}>⚠ Profile Incomplete</h3>
                                    <p style={{ color: 'var(--muted)', fontSize: '0.85rem' }}>Please fill in the missing details so we can generate a personalised cover letter and auto-apply on your behalf.</p>
                                </div>
                                <div style={{ padding: '1.25rem 1.5rem', display: 'flex', flexDirection: 'column', gap: '0.9rem', maxHeight: '55vh', overflowY: 'auto' }}>
                                    {missingModal.missing.map(f => (
                                        <div key={f.field}>
                                            <label style={{ display: 'block', fontSize: '0.82rem', color: 'var(--muted)', marginBottom: '0.3rem', fontWeight: 600 }}>{f.label} <span style={{ color: 'var(--red2)' }}>*</span></label>
                                            <input
                                                type={f.type || 'text'}
                                                placeholder={f.label}
                                                value={missingValues[f.field] || ''}
                                                onChange={e => setMissingValues(v => ({ ...v, [f.field]: e.target.value }))}
                                                style={{ ...styles.input, marginBottom: 0 }}
                                            />
                                            {f.field === 'skills_text' && <p style={{ fontSize: '0.75rem', color: 'var(--muted)', marginTop: '0.25rem' }}>Comma-separated, e.g. Java, Spring Boot, AWS</p>}
                                        </div>
                                    ))}
                                </div>
                                <div style={{ padding: '1rem 1.5rem', borderTop: '1px solid var(--border)', display: 'flex', gap: '0.75rem', justifyContent: 'flex-end' }}>
                                    <button onClick={() => { setMissingModal(null); setMissingValues({}); }} style={{ ...styles.btn, ...styles.btnSecondary }}>Cancel</button>
                                    <button
                                        disabled={missingModal.missing.some(f => !missingValues[f.field]?.trim())}
                                        onClick={submitMissingAndApply}
                                        style={{ ...styles.btn, background: 'linear-gradient(135deg,#059669,#2563eb)', color: '#fff', opacity: missingModal.missing.some(f => !missingValues[f.field]?.trim()) ? 0.45 : 1 }}>
                                        Save & Auto-Apply
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Not Interested Modal */}
                    {niModal && (
                        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1rem' }}
                            onClick={e => { if (e.target === e.currentTarget) setNiModal(null); }}>
                            <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 12, padding: '1.75rem', width: '100%', maxWidth: 480, maxHeight: '85vh', overflowY: 'auto' }}>
                                <h3 style={{ marginBottom: '0.25rem', fontSize: '1.1rem' }}>Not Interested</h3>
                                <p style={{ color: 'var(--muted)', fontSize: '0.88rem', marginBottom: '1.25rem' }}>
                                    {niModal.title.substring(0, 50)} — {niModal.company}
                                </p>

                                <p style={{ fontSize: '0.82rem', color: 'var(--muted)', marginBottom: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Select a reason</p>

                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.6rem' }}>
                                    {/* Predefined reasons */}
                                    {PREDEFINED_REASONS.map(reason => (
                                        <label key={reason} style={{ display: 'flex', alignItems: 'center', gap: '0.65rem', cursor: 'pointer', padding: '0.5rem 0.75rem', borderRadius: 8, background: niReason === reason ? 'rgba(220,38,38,0.12)' : 'transparent', border: `1px solid ${niReason === reason ? 'rgba(220,38,38,0.4)' : 'transparent'}`, transition: 'all 0.15s' }}>
                                            <input type="radio" name="ni_reason" value={reason} checked={niReason === reason} onChange={() => { setNiReason(reason); setNiOtherText(''); }}
                                                style={{ accentColor: 'var(--red)', width: 15, height: 15, flexShrink: 0 }} />
                                            <span style={{ fontSize: '0.9rem' }}>{reason}</span>
                                        </label>
                                    ))}

                                    {/* Previously saved custom reasons */}
                                    {niSavedReasons.filter(r => !PREDEFINED_REASONS.includes(r)).map(reason => (
                                        <label key={reason} style={{ display: 'flex', alignItems: 'center', gap: '0.65rem', cursor: 'pointer', padding: '0.5rem 0.75rem', borderRadius: 8, background: niReason === reason ? 'rgba(220,38,38,0.12)' : 'rgba(255,255,255,0.03)', border: `1px solid ${niReason === reason ? 'rgba(220,38,38,0.4)' : 'rgba(255,255,255,0.06)'}`, transition: 'all 0.15s' }}>
                                            <input type="radio" name="ni_reason" value={reason} checked={niReason === reason} onChange={() => { setNiReason(reason); setNiOtherText(''); }}
                                                style={{ accentColor: 'var(--red)', width: 15, height: 15, flexShrink: 0 }} />
                                            <span style={{ fontSize: '0.9rem' }}>{reason}</span>
                                            <span style={{ marginLeft: 'auto', fontSize: '0.7rem', color: 'var(--muted)', background: 'var(--bg3)', padding: '0.1rem 0.4rem', borderRadius: 4 }}>saved</span>
                                        </label>
                                    ))}

                                    {/* Other */}
                                    <label style={{ display: 'flex', alignItems: 'flex-start', gap: '0.65rem', cursor: 'pointer', padding: '0.5rem 0.75rem', borderRadius: 8, background: niReason === '__other__' ? 'rgba(220,38,38,0.12)' : 'transparent', border: `1px solid ${niReason === '__other__' ? 'rgba(220,38,38,0.4)' : 'transparent'}`, transition: 'all 0.15s' }}>
                                        <input type="radio" name="ni_reason" value="__other__" checked={niReason === '__other__'} onChange={() => setNiReason('__other__')}
                                            style={{ accentColor: 'var(--red)', width: 15, height: 15, flexShrink: 0, marginTop: 3 }} />
                                        <div style={{ flex: 1 }}>
                                            <span style={{ fontSize: '0.9rem' }}>Other</span>
                                            {niReason === '__other__' && (
                                                <input
                                                    autoFocus
                                                    type="text"
                                                    placeholder="Describe your reason..."
                                                    value={niOtherText}
                                                    onChange={e => setNiOtherText(e.target.value)}
                                                    onKeyDown={e => { if (e.key === 'Enter' && niOtherText.trim()) submitNotInterested(); }}
                                                    style={{ display: 'block', marginTop: '0.5rem', width: '100%', background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 6, padding: '0.4rem 0.65rem', color: 'var(--text)', fontSize: '0.88rem', outline: 'none' }}
                                                />
                                            )}
                                        </div>
                                    </label>
                                </div>

                                <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'flex-end', marginTop: '1.5rem' }}>
                                    <button style={{ ...styles.btn, ...styles.btnSecondary }} onClick={() => setNiModal(null)}>Cancel</button>
                                    <button
                                        disabled={!niReason || (niReason === '__other__' && !niOtherText.trim()) || niSaving}
                                        onClick={submitNotInterested}
                                        style={{ ...styles.btn, background: '#dc2626', color: '#fff', opacity: (!niReason || (niReason === '__other__' && !niOtherText.trim())) ? 0.4 : 1, cursor: (!niReason || (niReason === '__other__' && !niOtherText.trim())) ? 'not-allowed' : 'pointer' }}>
                                        {niSaving ? 'Saving...' : 'Confirm'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============================================================
        // Job Detail Page
        // ============================================================
        function JobDetail({ jobId, navigate, showToast }) {
            const [job, setJob] = useState(null);
            const [status, setStatus] = useState('');
            const [interview, setInterview] = useState({ round: '', date: '', time: '', timezone: 'IST', interviewer: '', meeting_link: '', platform: '', notes: '' });
            const [offer, setOffer] = useState({ salary: '', currency: 'INR', joining_date: '', deadline: '', benefits: '', location: '', offer_text: '', notes: '' });
            const [savingInterview, setSavingInterview] = useState(false);
            const [savingOffer, setSavingOffer] = useState(false);

            useEffect(() => {
                api.get(`/api/jobs/${jobId}`).then(j => {
                    setJob(j);
                    setStatus(j.status);
                    if (j.interview_details) setInterview(prev => ({ ...prev, ...j.interview_details }));
                    if (j.offer_details) setOffer(prev => ({ ...prev, ...j.offer_details }));
                });
            }, [jobId]);

            if (!job) return <div style={styles.container}><p style={{ color: 'var(--muted)' }}>Loading...</p></div>;

            const updateStatus = async () => {
                await api.post(`/api/jobs/${job.id}/status`, { status });
                showToast(`Status updated to "${status}"`, 'success');
                setJob(j => ({ ...j, status }));
            };

            const saveInterview = async () => {
                setSavingInterview(true);
                try {
                    const res = await api.post(`/api/jobs/${job.id}/interview`, interview);

                            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.3rem', marginBottom: '0.75rem' }}>

                            </div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.3rem', marginBottom: '1rem' }}>
                                <label style={{ fontSize: '0.78rem', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Notes</label>
                                <textarea rows={2} value={offer.notes} placeholder="Negotiation notes, questions, decisions..."
                                    onChange={e => setOffer(p => ({ ...p, notes: e.target.value }))}
                                    style={{ ...styles.input, resize: 'vertical', fontSize: '0.9rem', padding: '0.5rem 0.7rem', fontFamily: 'inherit' }} />
                            </div>
                            <button style={{ ...styles.btn, background: '#b45309', color: '#fff', padding: '0.5rem 1.4rem' }} onClick={saveOffer} disabled={savingOffer}>
                                {savingOffer ? 'Saving...' : 'Save Offer Details'}
                            </button>
                            {job.offer_details?.saved_at && <p style={{ fontSize: '0.78rem', color: 'var(--muted)', marginTop: '0.5rem' }}>Last saved: {fmtDate(job.offer_details.saved_at)}</p>}
                        </div>
                    )}

                    {job.score_details && (
                        <div style={styles.card}>
                            <h2 style={{ fontSize: '1rem', marginBottom: '0.75rem' }}>Match Analysis</h2>
                            <div style={{ display: 'flex', gap: '2rem', flexWrap: 'wrap', marginBottom: '0.75rem' }}>
                                <div><span style={{ color: 'var(--muted)' }}>Local: </span><strong>{Math.round((job.score_details.local_score || 0) * 100)}%</strong></div>
                                {job.score_details.ai_score != null && <div><span style={{ color: 'var(--muted)' }}>AI: </span><strong>{Math.round(job.score_details.ai_score * 100)}%</strong></div>}
                            </div>
                            {job.score_details.ai_reasons && job.score_details.ai_reasons.length > 0 && (
                                <ul style={{ paddingLeft: '1.5rem', lineHeight: 1.8, color: 'var(--text2)' }}>

                    {job.tags && job.tags.length > 0 && (

        // ============================================================
        // Search Page
        // ============================================================
        function Search({ profile, showToast, navigate }) {
            const [jobTitle, setJobTitle] = useState('');
            const [selectedSkills, setSelectedSkills] = useState(new Set());
            const [customSkills, setCustomSkills] = useState('');
            const [locationType, setLocationType] = useState('remote');
            const [customLocation, setCustomLocation] = useState('');
            const [remoteCountry, setRemoteCountry] = useState('');
            const [levels, setLevels] = useState(new Set(['Senior']));
            const [minScore, setMinScore] = useState(30);
            const [minSalary, setMinSalary] = useState(0);
            const [searchStatus, setSearchStatus] = useState(null);
            const [scheduleEnabled, setScheduleEnabled] = useState(false);
            const [scheduleInterval, setScheduleInterval] = useState(24);
            const [scheduleLastRun, setScheduleLastRun] = useState(null);
            const [scheduleSaving, setScheduleSaving] = useState(false);
            const [showSchedule, setShowSchedule] = useState(false);
            const pollRef = useRef(null);

            const toggleSkill = (skill) => {
                setSelectedSkills(prev => { const n = new Set(prev); n.has(skill) ? n.delete(skill) : n.add(skill); return n; });
            };

            const toggleLevel = (level) => {
                setLevels(prev => { const n = new Set(prev); n.has(level) ? n.delete(level) : n.add(level); return n; });
            };

            const selectRecommended = () => {
                setSelectedSkills(new Set(['Java', 'Python', 'Spring Boot', 'React.js', 'PostgreSQL', 'AWS', 'Docker', 'Kafka', 'Microservices', 'REST APIs', 'Redis']));
                if (!jobTitle) setJobTitle('Senior Backend Engineer');
            };

            const selectGroup = (group) => {
                const skills = profile.skills[group] || [];
                const allSelected = skills.every(s => selectedSkills.has(s));
                setSelectedSkills(prev => {
                    const n = new Set(prev);
                    skills.forEach(s => allSelected ? n.delete(s) : n.add(s));
                    return n;
                });
            };

            const startSearch = async () => {
                const allSkills = [...selectedSkills, ...customSkills.split(',').map(s => s.trim()).filter(Boolean)];
                if (!jobTitle && allSkills.length === 0) { showToast('Enter a job title or select skills', 'error'); return; }

                let location = 'remote';
                let country = remoteCountry || 'India';
                if (locationType === 'remote_country') location = `remote ${remoteCountry}`;
                else if (locationType === 'custom') { location = customLocation; country = ''; }
                await api.post('/api/search', { job_title: jobTitle, skills: allSkills, location, country, levels: [...levels], min_score: minScore / 100, min_salary: minSalary });
                showToast('Search started!', 'success');
                pollStatus();
            };

            const pollStatus = () => {
                if (pollRef.current) clearInterval(pollRef.current);
                pollRef.current = setInterval(async () => {
                    const status = await api.get('/api/search/status');
                    setSearchStatus(status);
                    if (!status.running) {
                        clearInterval(pollRef.current); pollRef.current = null;
                        if (status.progress >= 100 && navigate) { showToast(status.message, 'success'); setTimeout(() => navigate('jobs'), 1500); }
                    }
                }, 2000);
            };

            useEffect(() => {
                api.get('/api/search/status').then(s => { setSearchStatus(s); if (s.running) pollStatus(); });
                api.get('/api/search/schedule').then(s => {
                    setScheduleEnabled(s.enabled || false);
                    setScheduleInterval(s.interval_hours || 24);
                    setScheduleLastRun(s.last_run || null);
                }).catch(() => {});
                return () => { if (pollRef.current) clearInterval(pollRef.current); };
            }, []);

            const saveSchedule = async () => {
                setScheduleSaving(true);
                const customSkillList = customSkills.split(',').map(s => s.trim()).filter(Boolean);
                const allSkills = [...selectedSkills, ...customSkillList];
                let location = 'remote';
                if (locationType === 'remote_country') location = `remote ${remoteCountry}`;
                else if (locationType === 'custom') location = customLocation;
                try {
                    await api.put('/api/search/schedule', {
                        enabled: scheduleEnabled,
                        interval_hours: scheduleInterval,
                        params: { job_title: jobTitle, skills: allSkills, location, levels: [...levels], min_score: minScore / 100, min_salary: minSalary },
                    });
                    showToast(scheduleEnabled ? `Auto-search enabled (every ${scheduleInterval}h)` : 'Auto-search disabled', 'success');
                } catch { showToast('Failed to save schedule', 'error'); }
                setScheduleSaving(false);
            };

            return (
                <div style={styles.container}>
                    <h1 style={{ fontSize: '1.5rem', marginBottom: '1.5rem' }}>Search Jobs</h1>

                    <div style={styles.card}>
                        <h2 style={{ fontSize: '1.1rem', marginBottom: '1rem' }}>Configure Your Search</h2>

                        {/* Job title */}
                        <div style={{ marginBottom: '1.5rem' }}>
                            <label style={{ display: 'block', color: 'var(--muted)', fontWeight: 600, marginBottom: '0.4rem', fontSize: '0.9rem' }}>Job Title / Role</label>
                            <input style={styles.input} value={jobTitle} onChange={e => setJobTitle(e.target.value)} placeholder="e.g. Senior Backend Engineer, Java Developer..." />
                        </div>

                        {/* Location */}
                        <div style={{ marginBottom: '1.5rem' }}>
                            <label style={{ display: 'block', color: 'var(--muted)', fontWeight: 600, marginBottom: '0.4rem', fontSize: '0.9rem' }}>Location</label>
                            <div style={{ display: 'flex', gap: '1.25rem', alignItems: 'flex-start', flexWrap: 'wrap' }}>
                                <label style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', cursor: 'pointer', color: 'var(--text2)' }}>
                                    <input type="radio" checked={locationType === 'remote'} onChange={() => setLocationType('remote')} style={{ accentColor: 'var(--accent)' }} /> Remote (Worldwide)
                                </label>
                                <label style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', cursor: 'pointer', color: 'var(--text2)' }}>
                                    <input type="radio" checked={locationType === 'remote_country'} onChange={() => setLocationType('remote_country')} style={{ accentColor: 'var(--accent)' }} /> Remote in Country
                                </label>
                                <label style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', cursor: 'pointer', color: 'var(--text2)' }}>
                                    <input type="radio" checked={locationType === 'custom'} onChange={() => setLocationType('custom')} style={{ accentColor: 'var(--accent)' }} /> Specific Location
                                </label>
                            </div>
                            {locationType === 'remote_country' && (
                                <div style={{ marginTop: '0.75rem' }}>
                                    <select style={{ ...styles.select, width: '100%', maxWidth: 350 }} value={remoteCountry} onChange={e => setRemoteCountry(e.target.value)}>
                                        <option value="">Select country...</option>
                                        <option value="USA">United States (USA)</option>
                                        <option value="UK">United Kingdom (UK)</option>
                                        <option value="Canada">Canada</option>
                                        <option value="Germany">Germany</option>
                                        <option value="Netherlands">Netherlands</option>
                                        <option value="India">India</option>
                                        <option value="Australia">Australia</option>
                                        <option value="Singapore">Singapore</option>
                                        <option value="UAE">UAE / Dubai</option>
                                        <option value="France">France</option>
                                        <option value="Spain">Spain</option>
                                        <option value="Ireland">Ireland</option>
                                        <option value="Sweden">Sweden</option>
                                        <option value="Switzerland">Switzerland</option>
                                        <option value="Japan">Japan</option>
                                        <option value="Brazil">Brazil</option>
                                        <option value="Europe">Europe (Any)</option>
                                        <option value="APAC">Asia-Pacific (Any)</option>
                                        <option value="LATAM">Latin America (Any)</option>
                                    </select>
                                    <input style={{ ...styles.input, marginTop: '0.5rem', maxWidth: 350 }} value={remoteCountry} onChange={e => setRemoteCountry(e.target.value)} placeholder="Or type any country/region..." />
                                </div>
                            )}
                            {locationType === 'custom' && (
                                <input style={{ ...styles.input, marginTop: '0.75rem', maxWidth: 350 }} value={customLocation} onChange={e => setCustomLocation(e.target.value)} placeholder="e.g. New York, Berlin, Bangalore..." />
                            )}
                        </div>

                        {/* Salary */}
                        <div style={{ marginBottom: '1.5rem' }}>
                            <label style={{ display: 'block', color: 'var(--muted)', fontWeight: 600, marginBottom: '0.4rem', fontSize: '0.9rem' }}>
                                Minimum Salary (USD): <strong style={{ color: minSalary > 0 ? 'var(--green2)' : 'var(--text)' }}>{minSalary > 0 ? `$${minSalary.toLocaleString()}+/yr` : 'Any'}</strong>

        // ============================================================
        // Experience Timeline Component
        // ============================================================
        function ExperienceSection({ experience }) {
            const [activeIdx, setActiveIdx] = useState(null);

            // Accent colours per role index
            const COLORS = ['#2563eb','#059669','#7c3aed','#d97706','#0891b2','#dc2626','#be185d','#0d9488'];

            // Parse a period string like "Jan 2022 - Feb 2022" or "Jun 2023-Present"
            function parsePeriod(period) {
                if (!period) return null;
                const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
                const parts = period.replace(/–/g,'-').split(/\s*-\s*/);
                function parseDate(s) {
                    s = (s || '').trim().toLowerCase();
                    if (s === 'present' || s === 'current' || s === 'now') return new Date();
                    const m = s.match(/([a-z]+)\s+(\d{4})/);
                    if (m && MONTHS[m[1].slice(0,3)] !== undefined) return new Date(+m[2], MONTHS[m[1].slice(0,3)], 1);
                    const y = s.match(/\d{4}/);
                    return y ? new Date(+y[0], 0, 1) : null;
                }
                const start = parseDate(parts[0]);
                const end   = parseDate(parts[1] || 'present');
                return (start && end) ? { start, end } : null;
            }

            function fmtDuration(start, end) {
                const months = Math.round((end - start) / (1000 * 60 * 60 * 24 * 30.4));
                if (months < 1) return '< 1 mo';
                const y = Math.floor(months / 12), m = months % 12;
                return [y > 0 ? `${y} yr${y>1?'s':''}` : '', m > 0 ? `${m} mo` : ''].filter(Boolean).join(' ');
            }

            // Enrich experience items with parsed dates
            const items = experience.map((exp, i) => {
                const parsed = parsePeriod(exp.period);
                return { ...exp, parsed, color: COLORS[i % COLORS.length] };
            }).filter(e => e.parsed);

            if (items.length === 0) {
                // Fallback — plain list if no parseable dates
                return (
                    <div style={styles.card}>
                        <h2 style={{ fontSize: '1.1rem', marginBottom: '0.75rem' }}>Work Experience</h2>
                        {experience.map((exp, i) => (
                            <div key={i} style={{ marginBottom: '1.25rem', paddingBottom: '1.25rem', borderBottom: i < experience.length - 1 ? '1px solid var(--border)' : 'none' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: '0.25rem' }}>
                                    <h3 style={{ color: 'var(--text)', fontSize: '1rem' }}>{exp.title}</h3>
                                    <span style={{ color: 'var(--muted)', fontSize: '0.85rem' }}>{exp.period}</span>
                                </div>
                                <p style={{ color: '#60a5fa', marginBottom: '0.4rem', fontSize: '0.92rem' }}>{exp.company}</p>
                                <ul style={{ paddingLeft: '1.4rem', lineHeight: 1.8, color: '#cbd5e1', fontSize: '0.88rem' }}>
                                    {(exp.highlights || []).map((h, j) => <li key={j}>{h}</li>)}
                                </ul>
                            </div>
                        ))}
                    </div>
                );
            }

            // Timeline bounds
            const minDate = new Date(Math.min(...items.map(e => e.parsed.start)));
            const maxDate = new Date(Math.max(...items.map(e => e.parsed.end)));
            // Pad 3 months on each side
            minDate.setMonth(minDate.getMonth() - 3);
            maxDate.setMonth(maxDate.getMonth() + 3);
            const totalMs = maxDate - minDate;
            const pct = d => ((d - minDate) / totalMs) * 100;

            // Year tick marks
            const ticks = [];
            const startYear = minDate.getFullYear();
            const endYear   = maxDate.getFullYear() + 1;
            for (let y = startYear; y <= endYear; y++) {
                const p = pct(new Date(y, 0, 1));
                if (p >= 0 && p <= 100) ticks.push({ year: y, p });
            }

            return (
                <div style={styles.card}>
                    <h2 style={{ fontSize: '1.1rem', marginBottom: '1.5rem' }}>Work Experience</h2>

                    {/* ── Timeline chart ── */}
                    <div style={{ position: 'relative', marginBottom: '2rem', overflowX: 'auto' }}>
                        <div style={{ minWidth: 480, position: 'relative' }}>

                            {/* Role bars */}
                            <div style={{ position: 'relative', height: `${items.length * 52 + 8}px`, marginBottom: '0.5rem' }}>
                                {items.map((exp, i) => {
                                    const left  = pct(exp.parsed.start);
                                    const right = pct(exp.parsed.end);
                                    const width = Math.max(right - left, 0.8);
                                    const dur   = fmtDuration(exp.parsed.start, exp.parsed.end);
                                    const isEnd = exp.parsed.end >= new Date() - 86400000;
                                    const isActive = activeIdx === i;
                                    return (
                                        <div key={i}
                                            onMouseEnter={() => setActiveIdx(i)}
                                            onMouseLeave={() => setActiveIdx(null)}
                                            onClick={() => setActiveIdx(isActive ? null : i)}
                                            style={{
                                                position: 'absolute',
                                                top: `${i * 52 + 4}px`,
                                                left: `${left}%`,
                                                width: `${width}%`,
                                                height: 40,
                                                borderRadius: 8,
                                                background: isActive
                                                    ? exp.color
                                                    : `${exp.color}44`,
                                                border: `2px solid ${exp.color}`,
                                                cursor: 'pointer',
                                                transition: 'background 0.2s, box-shadow 0.2s',
                                                boxShadow: isActive ? `0 0 0 3px ${exp.color}55` : 'none',
                                                display: 'flex', alignItems: 'center',
                                                padding: '0 0.6rem',
                                                overflow: 'hidden',
                                                boxSizing: 'border-box',
                                            }}>
                                            {/* Company + title inside bar */}
                                            <div style={{ overflow: 'hidden', flex: 1, minWidth: 0 }}>
                                                <div style={{ fontSize: '0.7rem', color: isActive ? '#fff' : exp.color, fontWeight: 700, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                                    {exp.company}
                                                </div>
                                                <div style={{ fontSize: '0.65rem', color: isActive ? 'rgba(255,255,255,0.85)' : '#94a3b8', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                                    {exp.title}
                                                </div>
                                            </div>
                                            {/* Duration badge */}
                                            <span style={{ fontSize: '0.62rem', background: isActive ? 'rgba(0,0,0,0.25)' : `${exp.color}33`, color: isActive ? '#fff' : exp.color, borderRadius: 4, padding: '0.1rem 0.35rem', marginLeft: 4, flexShrink: 0, fontWeight: 700, whiteSpace: 'nowrap' }}>
                                                {dur}{isEnd ? ' 🟢' : ''}
                                            </span>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Year axis */}
                            <div style={{ position: 'relative', height: 24, borderTop: '1px solid var(--border)' }}>
                                {ticks.map(t => (
                                    <div key={t.year} style={{ position: 'absolute', left: `${t.p}%`, top: 0, transform: 'translateX(-50%)' }}>
                                        <div style={{ width: 1, height: 6, background: 'var(--border)', margin: '0 auto' }} />
                                        <span style={{ fontSize: '0.68rem', color: 'var(--muted)', whiteSpace: 'nowrap' }}>{t.year}</span>
                                    </div>
                                ))}
                            </div>

                            {/* Today marker */}
                            {(() => {
                                const tp = pct(new Date());
                                if (tp < 0 || tp > 100) return null;
                                return (
                                    <div style={{ position: 'absolute', top: 0, left: `${tp}%`, width: 1, height: `${items.length * 52 + 8}px`, background: 'rgba(37,99,235,0.5)', borderLeft: '1px dashed #2563eb', pointerEvents: 'none' }}>
                                        <span style={{ position: 'absolute', top: -18, left: 3, fontSize: '0.6rem', color: '#2563eb', fontWeight: 700, whiteSpace: 'nowrap' }}>Today</span>
                                    </div>
                                );
                            })()}
                        </div>
                    </div>

                    {/* ── Detail cards ── */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '0.75rem' }}>
                        {items.map((exp, i) => {
                            const dur = fmtDuration(exp.parsed.start, exp.parsed.end);
                            const isEnd = exp.parsed.end >= new Date() - 86400000;
                            return (
                                <div key={i}
                                    onMouseEnter={() => setActiveIdx(i)}
                                    onMouseLeave={() => setActiveIdx(null)}
                                    style={{
                                        background: activeIdx === i ? `${exp.color}14` : 'rgba(255,255,255,0.02)',
                                        border: `1px solid ${activeIdx === i ? exp.color : 'var(--border)'}`,
                                        borderLeft: `4px solid ${exp.color}`,
                                        borderRadius: 10, padding: '0.85rem 1rem',
                                        transition: 'border-color 0.2s, background 0.2s',
                                        cursor: 'default',
                                    }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '0.5rem', marginBottom: '0.3rem' }}>
                                        <div style={{ minWidth: 0 }}>
                                            <p style={{ fontWeight: 700, color: 'var(--text)', fontSize: '0.92rem', marginBottom: '0.1rem' }}>{exp.title}</p>
                                            <p style={{ color: exp.color, fontSize: '0.82rem', fontWeight: 600 }}>{exp.company}</p>
                                        </div>
                                        <div style={{ textAlign: 'right', flexShrink: 0 }}>
                                            <span style={{ display: 'inline-block', background: `${exp.color}22`, color: exp.color, border: `1px solid ${exp.color}55`, borderRadius: 6, padding: '0.15rem 0.5rem', fontSize: '0.7rem', fontWeight: 700 }}>
                                                {dur}
                                            </span>
                                            {isEnd && <span style={{ display: 'block', fontSize: '0.62rem', color: '#6ee7b7', marginTop: 2 }}>● Current</span>}
                                        </div>
                                    </div>
                                    <p style={{ color: 'var(--muted)', fontSize: '0.75rem', marginBottom: '0.5rem' }}>{exp.period}</p>
                                    {(exp.highlights || []).length > 0 && (
                                        <ul style={{ paddingLeft: '1.1rem', margin: 0, color: '#94a3b8', fontSize: '0.8rem', lineHeight: 1.75 }}>
                                            {exp.highlights.slice(0, 3).map((h, j) => <li key={j}>{h}</li>)}
                                            {exp.highlights.length > 3 && <li style={{ color: '#475569' }}>+{exp.highlights.length - 3} more…</li>}
                                        </ul>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ============================================================
        // Profile Page
        // ============================================================
        function Profile({ profile, setProfile, showToast }) {
            const fileRef = useRef(null);
            const avatarRef = useRef(null);
            const [uploading, setUploading] = useState(false);
            const [avatarHover, setAvatarHover] = useState(false);
            const [avatarUploading, setAvatarUploading] = useState(false);
            const [noticePeriod, setNoticePeriod] = useState(profile.notice_period || '');
            const [salaryMin, setSalaryMin] = useState(profile.expected_salary_min || '');
            const [salaryMax, setSalaryMax] = useState(profile.expected_salary_max || '');
            const [salaryCurrency, setSalaryCurrency] = useState(profile.expected_salary_currency || 'INR');
            const [salaryPeriod, setSalaryPeriod] = useState(profile.expected_salary_period || 'annually');
            const [prefSaving, setPrefSaving] = useState(false);
            const _prefSaved = !!(profile.notice_period || profile.expected_salary_min || profile.expected_salary_max);
            const [prefEditing, setPrefEditing] = useState(!_prefSaved);

            const uploadAvatar = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setAvatarUploading(true);
                const fd = new FormData();
                fd.append('avatar', file);
                try {
                    const res = await api.upload('/api/profile/upload-avatar', fd);
                    if (res.error) showToast(res.error, 'error');
                    else { setProfile(res.profile); showToast('Profile picture updated!', 'success'); }
                } catch (err) { showToast('Upload failed', 'error'); }
                setAvatarUploading(false);
                e.target.value = '';
            };

            const uploadResume = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                const fd = new FormData();
                fd.append('resume', file);
                try {
                    const res = await api.upload('/api/profile/upload-resume', fd);
                    if (res.error) { showToast(res.error, 'error'); }
                    else { setProfile(res.profile); showToast('Resume parsed successfully! Profile updated.', 'success'); }
                } catch (err) { showToast('Upload failed', 'error'); }
                setUploading(false);
                e.target.value = '';
            };

            const [jsonParsing, setJsonParsing] = useState(false);
            const jsonRef = useRef(null);
            const parseResumeJson = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setJsonParsing(true);
                const fd = new FormData();
                fd.append('resume', file);
                try {
                    const res = await api.upload('/api/profile/parse-resume-json', fd);
                    if (res.error) { showToast(res.error, 'error'); }
                    else {
                        const blob = new Blob([JSON.stringify(res.data, null, 2)], { type: 'application/json' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = 'resume_structured.json'; a.click();
                        URL.revokeObjectURL(url);
                        showToast('Structured JSON downloaded!', 'success');
                    }
                } catch (err) { showToast('Parsing failed', 'error'); }
                setJsonParsing(false);
                e.target.value = '';
            };

            const savePreferences = async () => {
                setPrefSaving(true);
                try {

        // ============================================================
        // Auth Page (Login / Signup + Google SSO)
        // ============================================================
        function AuthPage({ onAuth, showToast }) {
            const [mode, setMode] = useState('login'); // login | signup | otp | forgot | reset
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [otp, setOtp] = useState('');
            const [loading, setLoading] = useState(false);
            const [otpSent, setOtpSent] = useState(false);
            const [showGoogleBanner, setShowGoogleBanner] = useState(false);
            const [resetToken, setResetToken] = useState('');

            // Check for reset token in URL
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const token = params.get('reset_token');
                if (token) {
                    setResetToken(token);
                    setMode('reset');
                    window.history.replaceState({}, '', '/');
                }
            }, []);

            const googleLogin = () => { window.location.href = '/api/auth/google'; };

            const handleForgotPassword = async (e) => {
                e.preventDefault();
                if (!email) { showToast('Enter your email address', 'error'); return; }
                setLoading(true);
                try {
                    const res = await api.post('/api/auth/forgot-password', { email });
                    showToast(res.message || 'Reset link sent to your email', 'success');
                    setMode('login');
                } catch (err) { showToast('Something went wrong', 'error'); }
                setLoading(false);
            };

            const handleResetPassword = async (e) => {
                e.preventDefault();
                if (!password || password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
                setLoading(true);
                try {
                    const res = await api.post('/api/auth/reset-password', { token: resetToken, password });
                    if (res.error) { showToast(res.error, 'error'); }
                    else { showToast(res.message || 'Password reset! You can now sign in.', 'success'); setMode('login'); setResetToken(''); }
                } catch (err) { showToast('Something went wrong', 'error'); }
                setLoading(false);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setShowGoogleBanner(false);
                try {
                    if (otpSent) {
                        const res = await api.post('/api/auth/verify-otp', { email, otp });
                        if (res.error) showToast(res.error, 'error');
                        else if (res.user) onAuth(res.user);
                    } else if (mode === 'signup') {
                        const res = await api.post('/api/auth/signup', { name, email, password });
                        if (res.error) {
                            showToast(res.error, 'error');
                            if (res.use_google) setShowGoogleBanner(true);
                        }
                        else if (res.needs_otp) { setOtpSent(true); showToast('Verification code sent to your email!', 'success'); }
                        else if (res.user) onAuth(res.user);
                    } else {
                        const res = await api.post('/api/auth/login', { email, password });
                        if (res.error) showToast(res.error, 'error');
                        else if (res.user) onAuth(res.user);
                    }
                } catch (err) { showToast('Something went wrong. Please try again.', 'error'); }
                setLoading(false);
            };

            const labelStyle = { display: 'block', color: 'var(--muted)', fontWeight: 600, marginBottom: '0.3rem', fontSize: '0.85rem' };

            return (
                <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
                    <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 16, padding: '2.5rem', width: '100%', maxWidth: 420, animation: 'fadeIn 0.4s ease' }}>
