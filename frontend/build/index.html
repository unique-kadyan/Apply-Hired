<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobBot - Smart Job Application Bot</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
            --border: #334155; --text: #f1f5f9; --text2: #e2e8f0;
            --muted: #94a3b8; --accent: #2563eb; --accent2: #3b82f6;
            --green: #059669; --green2: #6ee7b7;
            --yellow: #f59e0b; --yellow2: #fcd34d;
            --red: #dc2626; --red2: #fca5a5;
            --purple: #7c3aed;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text2); min-height: 100vh; }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ---- Responsive ---- */
        /* hide-lg: hidden below 1024px (optional wide columns) */
        @media (max-width: 1024px) {
            .hide-lg { display: none !important; }
        }
        /* hide-md: hidden below 768px (location) */
        @media (max-width: 768px) {
            .hide-md { display: none !important; }
        }
        /* hide-sm: hidden below 520px (company, salary) */
        @media (max-width: 520px) {
            .hide-sm { display: none !important; }
        }
        @media (max-width: 768px) {
            .responsive-container { padding: 0.75rem !important; }
            .responsive-card { padding: 0.9rem !important; }
            .jobs-drawer { width: 100vw !important; max-width: 100vw !important; }
            .jobs-table th, .jobs-table td { padding: 0.45rem 0.5rem !important; font-size: 0.8rem !important; }
            .nav-label { display: none !important; }
            .nav-bar { padding: 0 0.75rem !important; gap: 0.5rem !important; }
            .page-title { font-size: 1.1rem !important; }
        }
        /* Action button cell */
        .action-cell { white-space: nowrap; }
        .action-btns { display: flex; gap: 0.4rem; align-items: center; flex-wrap: nowrap; }
        .action-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.3rem;
            height: 32px; padding: 0 0.7rem;
            border-radius: 8px; border: none; cursor: pointer;
            font-size: 0.78rem; font-weight: 600; white-space: nowrap; flex-shrink: 0;
            transition: filter 0.15s, transform 0.1s;
            letter-spacing: 0.01em;
        }
        .action-btn:hover { filter: brightness(1.18); transform: translateY(-1px); }
        .action-btn:active { transform: translateY(0) scale(0.97); filter: brightness(0.95); }
        .action-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        @media (max-width: 900px) {
            .action-btn { padding: 0 0.5rem; font-size: 0.75rem; height: 30px; border-radius: 7px; }
            .action-btns { gap: 0.3rem; }
        }
        @media (max-width: 600px) {
            /* Icon-only on very small screens */
            .action-btn .btn-label { display: none; }
            .action-btn { padding: 0; width: 30px; height: 30px; font-size: 0.9rem; border-radius: 7px; }
            .action-btns { gap: 0.25rem; }
        }
        @media (max-width: 420px) {
            .jobs-table th, .jobs-table td { padding: 0.35rem 0.35rem !important; font-size: 0.73rem !important; }
            .action-btn { width: 28px; height: 28px; font-size: 0.82rem; border-radius: 6px; }
        }
        /* Large displays — constrain max width for readability */
        @media (min-width: 1600px) {
            .jobs-table td, .jobs-table th { padding: 0.6rem 1rem !important; font-size: 0.9rem !important; }
        }
        details summary { list-style: none; }
        details summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ============================================================
        // API Helper
        // ============================================================
        const api = {
            get: (url) => fetch(url).then(r => r.json()),
            post: (url, data) => fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }).then(r => r.json()),
            put: (url, data) => fetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }).then(r => r.json()),
            upload: (url, formData) => fetch(url, { method: 'POST', body: formData }).then(r => r.json()),
        };

        // ============================================================
        // Shared Components
        // ============================================================
        const styles = {
            navbar: { background: 'var(--bg2)', borderBottom: '1px solid var(--border)', padding: '0 1.5rem', display: 'flex', alignItems: 'center', gap: '1rem', position: 'sticky', top: 0, zIndex: 100, height: 52, backdropFilter: 'blur(12px)' },
            logo: { fontSize: '1.15rem', fontWeight: 700, color: '#60a5fa', letterSpacing: '-0.02em', whiteSpace: 'nowrap' },
            navLink: { color: 'var(--muted)', fontWeight: 500, padding: '0.4rem 0.75rem', borderRadius: 8, transition: 'all 0.15s', cursor: 'pointer', fontSize: '0.88rem', border: 'none', background: 'none', whiteSpace: 'nowrap' },
            navActive: { color: '#fff', background: 'rgba(37,99,235,0.15)' },
            container: { maxWidth: 1400, margin: '0 auto', padding: 'clamp(0.75rem, 2vw, 1.5rem) clamp(0.75rem, 3vw, 2rem)', animation: 'fadeIn 0.3s ease' },
            card: { background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '1.5rem', marginBottom: '1rem', transition: 'border-color 0.2s' },
            btn: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: '0.4rem', padding: '0.55rem 1.1rem', border: 'none', borderRadius: 8, fontSize: '0.88rem', fontWeight: 600, cursor: 'pointer', transition: 'all 0.15s', textDecoration: 'none', whiteSpace: 'nowrap' },
            btnPrimary: { background: 'var(--accent)', color: '#fff' },
            btnSuccess: { background: 'var(--green)', color: '#fff' },
            btnSecondary: { background: '#475569', color: '#fff' },
            btnDanger: { background: 'var(--red)', color: '#fff' },
            btnSm: { padding: '0.35rem 0.7rem', fontSize: '0.8rem' },
            input: { background: 'var(--bg)', border: '1px solid #475569', color: 'var(--text2)', padding: '0.6rem 1rem', borderRadius: 8, fontSize: '0.9rem', width: '100%', outline: 'none', transition: 'border-color 0.2s' },
            select: { background: 'var(--bg)', border: '1px solid #475569', color: 'var(--text2)', padding: '0.5rem 1rem', borderRadius: 8, fontSize: '0.9rem', outline: 'none' },
        };

        function Badge({ score }) {
            const pct = Math.round(score * 100);
            const cls = pct >= 70 ? { background: '#065f46', color: '#6ee7b7' } : pct >= 40 ? { background: '#78350f', color: '#fcd34d' } : { background: '#7f1d1d', color: '#fca5a5' };
            return <span style={{ ...cls, padding: '0.2rem 0.6rem', borderRadius: 20, fontWeight: 700, fontSize: '0.82rem', display: 'inline-block', minWidth: 44, textAlign: 'center' }}>{pct}%</span>;
        }

        function StatusBadge({ status }) {
            const colors = { new: { bg: '#164e63', fg: '#67e8f9' }, previous: { bg: '#334155', fg: '#94a3b8' }, saved: { bg: '#1e3a5f', fg: '#93c5fd' }, applied: { bg: '#065f46', fg: '#6ee7b7' }, interview: { bg: '#581c87', fg: '#d8b4fe' }, rejected: { bg: '#7f1d1d', fg: '#fca5a5' }, offer: { bg: '#14532d', fg: '#86efac' } };
            const c = colors[status] || colors.new;
            return <span style={{ background: c.bg, color: c.fg, padding: '0.2rem 0.6rem', borderRadius: 20, fontWeight: 600, fontSize: '0.78rem', textTransform: 'capitalize' }}>{status}</span>;
        }

        function SkillChip({ label, selected, onClick }) {
            return (
                <button onClick={onClick} style={{ background: selected ? '#1e3a5f' : 'var(--bg2)', border: `1px solid ${selected ? '#3b82f6' : '#475569'}`, color: selected ? '#93c5fd' : 'var(--muted)', padding: '0.35rem 0.8rem', borderRadius: 20, fontSize: '0.85rem', fontWeight: selected ? 600 : 500, cursor: 'pointer', transition: 'all 0.15s', margin: '0.15rem' }}>
                    {label}
                </button>
            );
        }

        function Toast({ message, type, onClose }) {
            useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
            const bg = type === 'success' ? '#065f46' : type === 'error' ? '#7f1d1d' : '#78350f';
            const fg = type === 'success' ? '#6ee7b7' : type === 'error' ? '#fca5a5' : '#fcd34d';
            return (
                <div style={{ position: 'fixed', bottom: 20, right: 20, background: 'var(--bg2)', border: `1px solid ${fg}33`, borderRadius: 12, padding: '1rem 1.5rem', zIndex: 200, boxShadow: '0 8px 30px rgba(0,0,0,0.5)', maxWidth: 400, animation: 'fadeIn 0.3s', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                    <span style={{ color: fg, fontSize: '1.2rem' }}>{type === 'success' ? '\u2713' : type === 'error' ? '\u2717' : '\u26A0'}</span>
                    <span style={{ color: fg, fontWeight: 500 }}>{message}</span>
                    <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', marginLeft: 'auto', fontSize: '1rem' }}>&times;</button>
                </div>
            );
        }

        function ConnectAccounts({ profile, setProfile, showToast }) {
            const [editing, setEditing] = useState(null);
            const [githubInput, setGithubInput] = useState(profile.github_username || '');
            const [linkedinInput, setLinkedinInput] = useState(profile.linkedin || '');
            const [portfolioInput, setPortfolioInput] = useState(profile.website || '');
            const [loading, setLoading] = useState('');
            const [githubRateLimit, setGithubRateLimit] = useState(false);
            const [githubTokenInput, setGithubTokenInput] = useState(profile.github_token ? '••••••••' : '');
            const [editingToken, setEditingToken] = useState(false);
            const [showAllProjects, setShowAllProjects] = useState(false);

            // Gmail state
            const [gmailStatus, setGmailStatus] = useState(null); // null = loading, {connected, last_sync}
            const [gmailSyncing, setGmailSyncing] = useState(false);
            const [gmailResult, setGmailResult] = useState(null); // last sync result

            useEffect(() => {
                api.get('/api/gmail/status').then(r => setGmailStatus(r)).catch(() => setGmailStatus({ connected: false }));
            }, []);

            // Handle Gmail OAuth popup postMessage + legacy URL redirect fallback
            useEffect(() => {
                // Popup sends postMessage when auth completes
                const onMessage = (e) => {
                    if (e.data?.type === 'gmail_connected') {
                        api.get('/api/gmail/status').then(r => setGmailStatus(r));
                        showToast('Gmail connected! Click "Sync Now" to scan for interview & offer emails.', 'success');
                    } else if (e.data?.type === 'gmail_error') {
                        showToast(`Gmail connection failed: ${e.data.detail || 'unknown error'}`, 'error');
                    }
                };
                window.addEventListener('message', onMessage);
                // Legacy fallback: user landed back via redirect (no popup support)
                if (new URLSearchParams(window.location.search).get('gmail_connected')) {
                    window.history.replaceState({}, '', '/');
                    api.get('/api/gmail/status').then(r => setGmailStatus(r));
                    showToast('Gmail connected! Click "Sync Now" to scan for interview & offer emails.', 'success');
                }
                return () => window.removeEventListener('message', onMessage);
            }, []);

            const connectGmail = () => {
                const w = 600, h = 700;
                const left = Math.max(0, (screen.width - w) / 2);
                const top  = Math.max(0, (screen.height - h) / 2);
                window.open(
                    '/api/gmail/auth',
                    'gmail_oauth',
                    `width=${w},height=${h},top=${top},left=${left},menubar=no,toolbar=no,location=no,status=no`
                );
            };

            const gmailSync = async () => {
                setGmailSyncing(true);
                setGmailResult(null);
                try {
                    const res = await api.post('/api/gmail/sync', {});
                    setGmailResult(res);
                    api.get('/api/gmail/status').then(r => setGmailStatus(r));
                    const total = (res.interview || 0) + (res.offer || 0);
                    if (total > 0) showToast(`Gmail sync: ${res.interview} interview${res.interview !== 1 ? 's' : ''}, ${res.offer} offer${res.offer !== 1 ? 's' : ''} detected!`, 'success');
                    else showToast(`Gmail sync complete — ${res.scanned} emails scanned, no new updates.`, 'success');
                } catch { showToast('Gmail sync failed', 'error'); }
                setGmailSyncing(false);
            };

            const gmailDisconnect = async () => {
                await api.post('/api/gmail/disconnect', {});
                setGmailStatus({ connected: false });
                setGmailResult(null);
                showToast('Gmail disconnected', 'success');
            };

            // GitHub token generation URL — opens GitHub's fine-grained PAT page
            const GITHUB_TOKEN_URL = 'https://github.com/settings/personal-access-tokens/new';

            const connectGithub = async (tokenOverride) => {
                const val = githubInput.trim();
                if (!val) { showToast('Enter a GitHub username or URL', 'error'); return; }
                setLoading('github');
                try {
                    const body = { username: val };
                    const token = tokenOverride || (editingToken ? githubTokenInput.trim() : '');
                    if (token && !token.startsWith('•')) body.token = token;
                    const res = await api.post('/api/profile/connect/github', body);
                    if (res.error) {
                        if (res.rate_limit) {
                            setGithubRateLimit(true);
                            setEditingToken(true);
                            return; // token panel already explains the situation — no toast needed
                        }
                        showToast(res.error, 'error');
                    } else {
                        setProfile(res.profile);
                        setGithubRateLimit(false);
                        setEditingToken(false);
                        if (res.profile?.github_token) setGithubTokenInput('••••••••');
                        const s = res.stats || {};
                        showToast(`✓ GitHub connected — ${s.public_repos || 0} repos, ${s.languages_added || 0} languages, ${s.projects_added || 0} projects imported`, 'success');
                        setEditing(null);
                    }
                } catch (err) { showToast('Could not reach server. Please try again.', 'error'); }
                setLoading('');
            };

            const connectLinkedin = async () => {
                if (!linkedinInput.trim()) return;
                setLoading('linkedin');
                try {
                    const res = await api.post('/api/profile/connect/linkedin', { url: linkedinInput });
                    if (res.error) showToast(res.error, 'error');
                    else { setProfile(res.profile); showToast('LinkedIn connected!', 'success'); setEditing(null); }
                } catch (err) { showToast('Failed to connect LinkedIn', 'error'); }
                setLoading('');
            };

            const connectPortfolio = async () => {
                if (!portfolioInput.trim()) return;
                setLoading('portfolio');
                try {
                    const res = await api.post('/api/profile/connect/portfolio', { url: portfolioInput });
                    if (res.error) showToast(res.error, 'error');
                    else { setProfile(res.profile); showToast('Portfolio connected!', 'success'); setEditing(null); }
                } catch (err) { showToast('Failed to connect portfolio', 'error'); }
                setLoading('');
            };

            const accounts = [
                { key: 'github', label: 'GitHub', value: profile.github, display: profile.github_username || profile.github, input: githubInput, setInput: setGithubInput, connect: connectGithub, placeholder: 'username or URL' },
                { key: 'linkedin', label: 'LinkedIn', value: profile.linkedin, display: profile.linkedin, input: linkedinInput, setInput: setLinkedinInput, connect: connectLinkedin, placeholder: 'https://linkedin.com/in/yourname' },
                { key: 'portfolio', label: 'Portfolio', value: profile.website, display: profile.website, input: portfolioInput, setInput: setPortfolioInput, connect: connectPortfolio, placeholder: 'https://yoursite.com' },
            ];

            const connectedStyle = { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0.6rem 0', borderBottom: '1px solid var(--border)' };
            const editRowStyle = { display: 'flex', gap: '0.5rem', alignItems: 'center', padding: '0.6rem 0', borderBottom: '1px solid var(--border)' };

            return (
                <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '1.5rem', marginBottom: '1rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.75rem' }}>
                        <h2 style={{ fontSize: '1.1rem', margin: 0 }}>Connected Accounts</h2>
                        {profile.profile_updated_at && (
                            <span style={{ color: '#475569', fontSize: '0.72rem' }}>
                                Updated {new Date(profile.profile_updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })}
                            </span>
                        )}
                    </div>

                    {accounts.map(acc => (
                        <div key={acc.key}>
                            {editing === acc.key ? (
                                <div style={{ ...editRowStyle, flexWrap: 'wrap', gap: '0.5rem' }}>
                                    <span style={{ color: 'var(--muted)', fontSize: '0.85rem', minWidth: 65, fontWeight: 600 }}>{acc.label}</span>
                                    <input
                                        style={{ ...styles.input, flex: 1, minWidth: 180, marginBottom: 0 }}
                                        value={acc.input}
                                        onChange={e => acc.setInput(e.target.value)}
                                        onKeyDown={e => { if (e.key === 'Enter') acc.connect(); if (e.key === 'Escape') setEditing(null); }}
                                        placeholder={acc.placeholder}
                                        autoFocus
                                    />
                                    <button onClick={() => acc.connect()} disabled={loading === acc.key || !acc.input.trim()}
                                        style={{ ...styles.btn, ...styles.btnSm, ...styles.btnPrimary, minWidth: 80, opacity: !acc.input.trim() ? 0.5 : 1 }}>
                                        {loading === acc.key ? '⏳ Importing…' : 'Connect'}
                                    </button>
                                    <button onClick={() => setEditing(null)}
                                        style={{ ...styles.btn, ...styles.btnSm, ...styles.btnSecondary }}>
                                        Cancel
                                    </button>
                                </div>
                            ) : acc.value ? (
                                <div style={connectedStyle}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                        <span style={{ color: 'var(--green2)', fontSize: '0.82rem' }}>&#10003;</span>
                                        <span style={{ color: 'var(--muted)', fontSize: '0.85rem', minWidth: 55 }}>{acc.label}</span>
                                        <a href={acc.display && acc.display.startsWith('http') ? acc.display : '#'} target="_blank" rel="noopener"
                                           style={{ fontSize: '0.85rem', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', display: 'inline-block' }}>
                                            {acc.display}
                                        </a>
                                    </div>
                                    <button onClick={() => { setEditing(acc.key); acc.setInput(acc.display || ''); }}
                                        title="Edit"
                                        style={{ background: 'rgba(99,102,241,0.1)', border: '1px solid rgba(99,102,241,0.25)', color: '#818cf8', cursor: 'pointer', borderRadius: 8, width: 30, height: 30, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.18s', flexShrink: 0 }}
                                        onMouseEnter={e => { e.currentTarget.style.background = 'rgba(99,102,241,0.22)'; e.currentTarget.style.borderColor = '#818cf8'; }}
                                        onMouseLeave={e => { e.currentTarget.style.background = 'rgba(99,102,241,0.1)'; e.currentTarget.style.borderColor = 'rgba(99,102,241,0.25)'; }}>
                                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                    </button>
                                </div>
                            ) : (
                                <div style={connectedStyle}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                        <span style={{ color: '#475569', fontSize: '0.82rem' }}>&#9675;</span>
                                        <span style={{ color: 'var(--muted)', fontSize: '0.85rem' }}>{acc.label}</span>
                                        <span style={{ color: '#475569', fontSize: '0.82rem' }}>Not connected</span>
                                    </div>
                                    <button onClick={() => setEditing(acc.key)}
                                        style={{ ...styles.btn, ...styles.btnSm, ...styles.btnPrimary, fontSize: '0.78rem' }}>
                                        Connect
                                    </button>
                                </div>
                            )}
                        </div>
                    ))}

                    {/* GitHub Token Panel — shown on rate-limit error OR if user wants to set/update token */}
                    {(githubRateLimit || editingToken) && (
                        <div style={{ marginTop: '0.75rem', background: 'rgba(245,158,11,0.08)', border: '1px solid rgba(245,158,11,0.3)', borderRadius: 10, padding: '1rem' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' }}>
                                <div>
                                    <p style={{ fontWeight: 700, fontSize: '0.88rem', color: '#fcd34d', marginBottom: '0.2rem' }}>
                                        {githubRateLimit ? '⚠ GitHub API Rate Limit Reached' : '🔑 GitHub Personal Access Token'}
                                    </p>
                                    <p style={{ color: 'var(--muted)', fontSize: '0.8rem' }}>
                                        {githubRateLimit
                                            ? 'Unauthenticated requests are limited to 60/hour. Provide a GitHub token to get 5,000/hour.'
                                            : 'A stored token lets us import your full GitHub profile without hitting rate limits.'}
                                    </p>
                                </div>
                                <button onClick={() => { setGithubRateLimit(false); setEditingToken(false); }}
                                    style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: '1.2rem', padding: '0 0.2rem', lineHeight: 1 }}>×</button>
                            </div>

                            {/* Step-by-step instructions */}
                            <ol style={{ color: 'var(--muted)', fontSize: '0.8rem', paddingLeft: '1.1rem', lineHeight: 1.9, marginBottom: '0.75rem' }}>
                                <li>Click the button below to open GitHub → Settings → Personal Access Tokens</li>
                                <li>Click <strong style={{ color: '#e2e8f0' }}>Generate new token</strong> (Fine-grained or Classic)</li>
                                <li>Give it a name (e.g. <em>JobBot</em>), set expiration, select scope: <strong style={{ color: '#e2e8f0' }}>read:user</strong> (or leave default for fine-grained)</li>
                                <li>Copy the generated token and paste it below</li>
                            </ol>

                            <a href={GITHUB_TOKEN_URL} target="_blank" rel="noopener noreferrer"
                                style={{ ...styles.btn, ...styles.btnSm, background: '#24292f', color: '#fff', display: 'inline-flex', alignItems: 'center', gap: '0.4rem', marginBottom: '0.75rem', textDecoration: 'none', border: '1px solid #444' }}>
                                🐙 Open GitHub → Create Token ↗
                            </a>

                            <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                                <input

        function ResumeScoreCard({ score }) {
            if (!score || !score.sections) return null;
            const total = score.total_score || 0;
            const color = total >= 80 ? '#6ee7b7' : total >= 60 ? '#fcd34d' : total >= 40 ? '#fdba74' : '#fca5a5';
            const label = total >= 80 ? 'Excellent' : total >= 60 ? 'Good' : total >= 40 ? 'Needs Work' : 'Weak';

            const sectionLabels = {
                contact_info: 'Contact Info', summary: 'Summary', skills: 'Skills',
                experience: 'Experience', education: 'Education', formatting: 'Formatting', ats_keywords: 'ATS Keywords',
            };

            return (
                <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '1.5rem', marginBottom: '1rem' }}>
                    {/* Header with circular score */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: '1.25rem', marginBottom: '1.5rem', flexWrap: 'wrap' }}>
                        <div style={{
                            width: 80, height: 80, borderRadius: '50%',
                            background: `conic-gradient(${color} ${total * 3.6}deg, var(--bg3) 0deg)`,
                            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                        }}>
                            <div style={{
                                width: 64, height: 64, borderRadius: '50%', background: 'var(--bg2)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column',
                            }}>
                                <span style={{ fontSize: '1.3rem', fontWeight: 800, color, lineHeight: 1 }}>{total}</span>
                                <span style={{ fontSize: '0.6rem', color: 'var(--muted)' }}>/100</span>
                            </div>
                        </div>
                        <div>
                            <h2 style={{ margin: 0, fontSize: '1.1rem' }}>Resume Score</h2>
                            <p style={{ color, fontWeight: 600, margin: '0.2rem 0 0' }}>{label}</p>
                        </div>
                    </div>

                    {/* Section score bars */}
                    <div style={{ display: 'grid', gap: '0.5rem', marginBottom: '0.5rem' }}>
                        {Object.entries(score.sections).map(([key, sec]) => {
                            const pct = Math.round((sec.score / sec.max) * 100);
                            const barColor = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--red)';
                            return (
                                <div key={key}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.82rem', marginBottom: '0.2rem' }}>
                                        <span style={{ color: 'var(--text2)' }}>{sectionLabels[key] || key}</span>
                                        <span style={{ color: 'var(--muted)' }}>{sec.score}/{sec.max}</span>
                                    </div>
                                    <div style={{ background: 'var(--bg3)', borderRadius: 6, height: 8, overflow: 'hidden' }}>
                                        <div style={{ background: barColor, height: '100%', borderRadius: 6, width: `${pct}%`, transition: 'width 0.5s' }}></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ============================================================
        // Paid Resume Optimizer CTA + Flow
        // ============================================================
        function ResumeOptimizer({ profile, setProfile, showToast }) {
            const [loading, setLoading] = useState(false);
            const [optimized, setOptimized] = useState(profile.optimized_resume || null);
            const [hasPaid, setHasPaid] = useState(false);
            const [targetRole, setTargetRole] = useState(profile.title || '');
            const [targetCompany, setTargetCompany] = useState('');
            const [jobDesc, setJobDesc] = useState('');
            const [showForm, setShowForm] = useState(false);
            const [priceLabel, setPriceLabel] = useState('');

            useEffect(() => {
                api.get('/api/payment/has-paid').then(r => setHasPaid(r.paid));
                api.get('/api/payment/config').then(r => setPriceLabel(r.display_amount || ''));
                if (profile.optimized_resume) setOptimized(profile.optimized_resume);
            }, [profile]);

            const startPayment = async () => {
                try {
                    const config = await api.get('/api/payment/config');
                    if (!config.configured) { showToast('Payment gateway not configured', 'error'); return; }

                    const order = await api.post('/api/payment/create-order', {});
                    if (order.error) { showToast(order.error, 'error'); return; }

                    const options = {
                        key: order.key_id,
                        amount: order.amount,
                        currency: order.currency,
                        name: 'JobBot',
                        description: 'ATS Resume Optimization',
                        order_id: order.order_id,
                        handler: async (response) => {
                            const verify = await api.post('/api/payment/verify', {
                                order_id: response.razorpay_order_id,
                                payment_id: response.razorpay_payment_id,
                                signature: response.razorpay_signature,
                            });
                            if (verify.paid) {
                                setHasPaid(true);
                                showToast('Payment successful! Now customize and optimize.', 'success');
                                setShowForm(true);
                            } else {
                                showToast('Payment verification failed', 'error');
                            }
                        },
                        prefill: { name: profile.name, email: profile.email, contact: profile.phone },
                        theme: { color: '#2563eb' },
                    };
                    const rzp = new window.Razorpay(options);
                    rzp.open();
                } catch (err) {
                    showToast('Payment failed. Please try again.', 'error');
                }
            };

            const runOptimization = async () => {
                setLoading(true);
                showToast('Optimizing your resume with AI... This may take 15-20 seconds.', 'warning');
                try {
                    const res = await api.post('/api/payment/optimize-resume', {
                        target_role: targetRole, target_company: targetCompany, job_description: jobDesc,
                    });
                    if (res.error) { showToast(res.error, 'error'); }
                    else {
                        setOptimized(res.optimized);
                        if (res.profile) setProfile(res.profile);
                        showToast('Resume optimized!', 'success');
                        setShowForm(false);
                    }
                } catch (err) { showToast('Optimization failed', 'error'); }
                setLoading(false);
            };

            // Already optimized — show result
            if (optimized && !showForm) {
                return (
                    <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '1.5rem', marginBottom: '1rem' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.5rem' }}>
                            <h2 style={{ fontSize: '1.1rem', margin: 0, color: 'var(--green2)' }}>ATS-Optimized Resume</h2>
                            {profile.optimized_for && (
                                <span style={{ color: 'var(--muted)', fontSize: '0.78rem' }}>
                                    Tailored for: {profile.optimized_for.role}{profile.optimized_for.company ? ` at ${profile.optimized_for.company}` : ''}
                                </span>
                            )}
                        </div>

                        {/* Optimized Summary */}
                        <div style={{ background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 10, padding: '1rem', marginBottom: '1rem' }}>

        // ============================================================
        // ============================================================
        // Chart hook — mounts/destroys a Chart.js instance on a canvas
        // ============================================================
        function useChart(ref, config, deps) {
            useEffect(() => {
                if (!ref.current) return;
                const ctx = ref.current.getContext('2d');
                const chart = new Chart(ctx, config);
                return () => chart.destroy();
            }, deps);
        }

        // ============================================================
        // Mini chart components
        // ============================================================
        function DonutChart({ data, labels, colors, title }) {
            const ref = useRef();
            useChart(ref, {
                type: 'doughnut',
                data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#1e293b', hoverOffset: 6 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '68%',
                    plugins: {
                        legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 11 }, padding: 10, boxWidth: 12 } },
                        title: { display: !!title, text: title, color: '#e2e8f0', font: { size: 13, weight: '600' }, padding: { bottom: 10 } },
                        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}` } },
                    },
                },
            }, [JSON.stringify(data)]);
            return <canvas ref={ref} style={{ maxHeight: 200 }} />;
        }

        function BarChart({ labels, values, color, title, horizontal }) {
            const ref = useRef();
            useChart(ref, {
                type: 'bar',
                data: { labels, datasets: [{ data: values, backgroundColor: color || '#2563eb', borderRadius: 5, borderSkipped: false }] },
                options: {
                    indexAxis: horizontal ? 'y' : 'x',
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        title: { display: !!title, text: title, color: '#e2e8f0', font: { size: 13, weight: '600' }, padding: { bottom: 10 } },
                    },
                    scales: {
                        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(51,65,85,0.5)' } },
                        y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(51,65,85,0.5)' } },
                    },
                },
            }, [JSON.stringify(values)]);
            return <canvas ref={ref} style={{ maxHeight: horizontal ? Math.max(160, labels.length * 28) : 180 }} />;
        }

        function LineChart({ labels, values, title }) {
            const ref = useRef();
            useChart(ref, {
                type: 'line',
                data: { labels, datasets: [{
                    data: values, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.12)',
                    fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: '#2563eb',
                }]},
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, title: { display: !!title, text: title, color: '#e2e8f0', font: { size: 13, weight: '600' }, padding: { bottom: 10 } } },
                    scales: {
                        x: { ticks: { color: '#64748b', font: { size: 9 }, maxRotation: 45 }, grid: { color: 'rgba(51,65,85,0.4)' } },
                        y: { ticks: { color: '#64748b', font: { size: 10 }, stepSize: 1 }, grid: { color: 'rgba(51,65,85,0.4)' }, beginAtZero: true },
                    },
                },
            }, [JSON.stringify(values)]);
            return <canvas ref={ref} style={{ maxHeight: 160 }} />;
        }

        // Funnel as pure SVG (Chart.js has no native funnel)
        function FunnelChart({ stages }) {
            if (!stages || !stages.length) return null;
            const max = stages[0].count || 1;
            const H = 44, GAP = 6, W = 100;
            const COLORS = ['#2563eb','#0891b2','#059669','#d97706','#7c3aed'];
            return (
                <div style={{ width: '100%' }}>
                    {stages.map((s, i) => {
                        const pct = max > 0 ? (s.count / max) * 100 : 0;
                        return (
                            <div key={s.stage} style={{ marginBottom: GAP }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
                                    <span style={{ fontSize: '0.78rem', color: '#94a3b8' }}>{s.stage}</span>
                                    <span style={{ fontSize: '0.78rem', fontWeight: 700, color: COLORS[i] }}>{s.count}</span>
                                </div>
                                <div style={{ background: 'rgba(51,65,85,0.4)', borderRadius: 4, height: 10, width: '100%' }}>
                                    <div style={{ width: `${pct}%`, height: '100%', background: COLORS[i], borderRadius: 4, transition: 'width 0.6s ease', minWidth: s.count > 0 ? 4 : 0 }} />
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ---- Salary helpers (frontend display) ----------------------------
        const CURRENCY_SYMBOLS = { INR:'₹', GBP:'£', EUR:'€', JPY:'¥', AUD:'A$', CAD:'C$', SGD:'S$', AED:'AED ', ZAR:'R', BRL:'R$', USD:'$', CHF:'CHF ', SEK:'SEK ', NOK:'NOK ', DKK:'DKK ', PLN:'PLN ', HUF:'HUF ', MXN:'MX$', NZD:'NZ$', HKD:'HK$' };
        function detectCurrency(salaryStr, location) {
            const s = salaryStr || '';
            if (/₹|INR|Rs/i.test(s)) return 'INR';
            if (/£|GBP/i.test(s)) return 'GBP';
            if (/€|EUR/i.test(s)) return 'EUR';
            if (/A\$|AUD/i.test(s)) return 'AUD';
            if (/C\$|CAD/i.test(s)) return 'CAD';
            if (/S\$|SGD/i.test(s)) return 'SGD';
            if (/AED|dirham/i.test(s)) return 'AED';
            if (/R\$|BRL/i.test(s)) return 'BRL';
            if (/CHF/i.test(s)) return 'CHF';
            if (/NZ\$|NZD/i.test(s)) return 'NZD';
            if (/HK\$|HKD/i.test(s)) return 'HKD';
            if (/\$/.test(s)) return 'USD';
            const loc = (location || '').toLowerCase();
            if (loc.includes('india')) return 'INR';
            if (loc.includes('uk') || loc.includes('united kingdom') || loc.includes('london')) return 'GBP';
            if (loc.includes('germany') || loc.includes('france') || loc.includes('netherlands') || loc.includes('europe')) return 'EUR';
            if (loc.includes('australia')) return 'AUD';
            if (loc.includes('canada')) return 'CAD';
            if (loc.includes('singapore')) return 'SGD';
            if (loc.includes('uae') || loc.includes('dubai')) return 'AED';
            return 'USD';
        }
        // Format ISO date string → "Apr 7, 2026"  (strips time component)
        function fmtDate(d) {
            if (!d) return '';
            const s = String(d).slice(0, 10); // "2026-04-07"
            if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) return d; // not ISO — return as-is
            const dt = new Date(s + 'T00:00:00');
            return dt.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function formatSalary(salaryStr, location) {
            if (!salaryStr || !salaryStr.trim()) return null;
            const currency = detectCurrency(salaryStr, location);
            const sym = CURRENCY_SYMBOLS[currency] || '';
            // Extract all numbers
            const nums = (salaryStr.match(/[\d,]+/g) || []).map(n => parseInt(n.replace(/,/g, '')));
            if (!nums.length) return salaryStr;
            const hasK = /k/i.test(salaryStr);
            const mult = hasK ? 1000 : 1;
            const fmt = n => {
                const v = n * mult;
                if (v >= 100000) return sym + (v / 1000).toFixed(0) + 'k';
                if (v >= 1000)   return sym + v.toLocaleString();
                return sym + v;
            };
            if (nums.length === 1) return fmt(nums[0]);
            return `${fmt(Math.min(...nums))} – ${fmt(Math.max(...nums))}`;
        }

        // ---- Cover Letter PDF export (jsPDF, direct download, no print dialog) ----
        function exportCoverLetterPdf(letter, jobTitle, company) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

            const PAGE_W = 210, PAGE_H = 297;
            const ML = 22, MR = 22, MT = 24, MB = 22;           // margins
            const CONTENT_W = PAGE_W - ML - MR;                  // 166 mm
            const BODY_FONT = 11, SMALL_FONT = 9, LINE_H = 6.2;  // mm line-height

            // ── Header band ──────────────────────────────────────────────
            doc.setFillColor(37, 99, 235);   // accent blue
            doc.rect(0, 0, PAGE_W, 18, 'F');
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(13);
            doc.setTextColor(255, 255, 255);
            doc.text(jobTitle || 'Cover Letter', ML, 11);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(SMALL_FONT);
            doc.text(company ? `Application for ${company}` : '', ML, 16);

            // ── Date line ────────────────────────────────────────────────
            const dateStr = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            doc.setTextColor(120, 120, 120);
            doc.setFontSize(SMALL_FONT);
            doc.text(dateStr, PAGE_W - MR, 16, { align: 'right' });

            // ── Body text ────────────────────────────────────────────────
            doc.setTextColor(30, 30, 30);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(BODY_FONT);

            // Split letter into paragraphs, then wrap each to content width
            const paragraphs = letter.trim().split(/\n{2,}|\r\n\r\n/);
            let y = MT + 8;

            for (const para of paragraphs) {
                const lines = doc.splitTextToSize(para.trim(), CONTENT_W);
                // New page if this paragraph won't fit
                if (y + lines.length * LINE_H > PAGE_H - MB) {
                    doc.addPage();
                    // Thin blue top bar on continuation pages
                    doc.setFillColor(37, 99, 235);
                    doc.rect(0, 0, PAGE_W, 4, 'F');
                    y = MT;
                }
                doc.text(lines, ML, y);
                y += lines.length * LINE_H + 3;   // paragraph gap 3 mm
            }

            // ── Footer rule ──────────────────────────────────────────────
            const totalPages = doc.internal.getNumberOfPages();
            for (let p = 1; p <= totalPages; p++) {
                doc.setPage(p);
                doc.setDrawColor(200, 200, 200);
                doc.line(ML, PAGE_H - MB + 3, PAGE_W - MR, PAGE_H - MB + 3);
                doc.setFontSize(7.5);
                doc.setTextColor(160, 160, 160);
                doc.text('Generated by JobBot', ML, PAGE_H - MB + 7);
                if (totalPages > 1) doc.text(`${p} / ${totalPages}`, PAGE_W - MR, PAGE_H - MB + 7, { align: 'right' });
            }

            const slug = s => (s || '').replace(/[^a-z0-9]+/gi, '_').replace(/^_+|_+$/g, '').toLowerCase();
            doc.save(`cover_letter_${slug(company)}_${slug(jobTitle)}.pdf`);
        }

                            <option value="150000">$150k+</option>

                                                    cursor: sortable ? 'pointer' : 'default',

                                                            ↗<span className="btn-label">View</span>

                                                            {j.status === 'offer' ? '💰' : '📅'}<span className="btn-label">{j.status === 'offer' ? 'Offer' : 'Interview'}</span>

                                                            className="action-btn"
                                                            style={{ background: 'rgba(124,58,237,0.22)', color: '#c4b5fd', border: '1px solid rgba(124,58,237,0.4)' }}>
                                                            📄<span className="btn-label">Cover Letter</span>
                                                        </button>
                                                    </div>
                                                ) : (
                                                    <div className="action-btns">
                                                        <a href={j.url} target="_blank" rel="noopener"
                                                            onClick={e => e.stopPropagation()}
                                                            title="Open Job Posting"
                                                            className="action-btn"
                                                            style={{ background: 'var(--accent)', color: '#fff', textDecoration: 'none' }}>
                                                            ↗<span className="btn-label">Open</span>
                                                        </a>

                                                            title="Mark as Applied"
                                                            disabled={j._marking}

                                                            className="action-btn"
                                                            style={{ background: 'var(--green)', color: '#fff' }}>
                                                            ✓<span className="btn-label">Applied</span>
                                                        </button>
                                                        <button
                                                            title={j.cover_letter ? 'View Cover Letter' : 'Generate Cover Letter'}
                                                            onClick={e => { e.stopPropagation(); openCoverLetter(j); }}
                                                            className="action-btn"
                                                            style={{ background: 'rgba(124,58,237,0.22)', color: '#c4b5fd', border: '1px solid rgba(124,58,237,0.4)' }}>
                                                            📄<span className="btn-label">{j.cover_letter ? 'Cover Letter' : 'Gen CL'}</span>
                                                        </button>
                                                        <button
                                                            title="Not Interested"
                                                            onClick={e => { e.stopPropagation(); openNiModal(j); }}
                                                            className="action-btn"
                                                            style={{ background: 'rgba(220,38,38,0.15)', color: 'var(--red2)', border: '1px solid rgba(220,38,38,0.35)' }}>
                                                            ✕<span className="btn-label">Skip</span>
                                                        </button>
                                                    </div>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>

                    {/* Pagination — only when total exceeds per-page */}

                            ...styles.btn, ...styles.btnSm,

                            opacity: disabled ? 0.35 : 1,
                            minWidth: 36, padding: '0.35rem 0.6rem',
                            fontWeight: active ? 700 : 400,
                        });
                        // Build page number window: always show first, last, and ±2 around current
                        const pageNums = [];
                        for (let i = 1; i <= totalPages; i++) {
                            if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) pageNums.push(i);
                            else if (pageNums[pageNums.length - 1] !== '…') pageNums.push('…');
                        }
                        return (
                            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '0.35rem', padding: '1.25rem 0', flexWrap: 'wrap' }}>
                                <button onClick={() => setPage(1)} disabled={page === 1}
                                    style={btnStyle(false, page === 1)}>«</button>
                                <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}
                                    style={btnStyle(false, page === 1)}>‹</button>

                                    ? <span key={`ellipsis-${i}`} style={{ color: 'var(--muted)', padding: '0 0.2rem', userSelect: 'none' }}>…</span>

                                    style={btnStyle(false, page === totalPages)}>»</button>

                        const fmtSalary = formatSalary(j.salary, j.location);

                        const descLines = (j.description || '').split(/[\n.!?]+/).map(s => s.trim()).filter(s => s.length > 40).slice(0, 4);
                        // Extract required years of experience from description
                        const expMatch = (j.description || j.title || '').match(/(\d+)\+?\s*(?:to\s*\d+\s*)?years?\s*(?:of\s*)?(?:experience|exp)/i)

                                      || (j.description || '').match(/minimum\s+(\d+)\s*years?/i);
                        const reqYears = expMatch ? expMatch[1] : null;

                                            <div style={{ flex: 1, minWidth: 0 }}>
                                                <h2 style={{ fontSize: '1.1rem', fontWeight: 700, marginBottom: '0.2rem', lineHeight: 1.3 }}>{j.title}</h2>
                                                <p style={{ color: '#60a5fa', fontWeight: 600, fontSize: '0.95rem', marginBottom: '0.15rem' }}>{j.company}</p>
                                                <p style={{ color: 'var(--muted)', fontSize: '0.82rem' }}>{[j.location, fmtDate(j.date_posted)].filter(Boolean).join(' · ')}</p>
                                            </div>
                                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '0.4rem', flexShrink: 0 }}>
                                                <Badge score={j.score} />
                                                <StatusBadge status={j.status} />

                                            </div>
                                        </div>
                                    </div>

                                    <div style={{ padding: '1.25rem 1.5rem', flex: 1 }}>
                                        {/* Salary highlight */}
                                        {fmtSalary ? (
                                            <div style={{ background: 'rgba(5,150,105,0.12)', border: '1px solid rgba(5,150,105,0.3)', borderRadius: 10, padding: '0.75rem 1rem', marginBottom: '1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <span style={{ color: 'var(--muted)', fontSize: '0.82rem', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Salary</span>
