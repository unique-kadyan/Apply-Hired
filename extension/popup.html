<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    .header { background: #1e293b; padding: 14px 16px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; }
    .logo { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status { font-size: 11px; color: #94a3b8; }
    .body { padding: 16px; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-success { background: #059669; color: #fff; }
    .btn-secondary { background: #475569; color: #fff; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .info { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 8px; line-height: 1.5; }
    .user-info { background: #1e293b; border-radius: 8px; padding: 10px; margin-bottom: 12px; font-size: 13px; }
    .user-info strong { color: #60a5fa; }
    .input { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 13px; margin-bottom: 8px; }
    .label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Kalibr</div>
    <div class="status" id="status">Loading...</div>
  </div>
  <div class="body">
    <div class="user-info" id="userInfo" style="display:none">
      <div><strong id="userName"></strong></div>
      <div id="userEmail" style="color:#94a3b8;font-size:12px"></div>
    </div>

    <div id="loginSection" style="display:none">
      <label class="label">Kalibr Server URL</label>
      <input class="input" id="serverUrl" placeholder="https://apply-hired.onrender.com" />
      <p class="info">Sign in to Kalibr in your browser first, then click below.</p>
      <button class="btn btn-primary" id="connectBtn">Connect to Kalibr</button>
    </div>

    <div id="actionSection" style="display:none">
      <button class="btn btn-primary" id="fillBtn">Auto-Fill This Form</button>
      <button class="btn btn-success" id="submitBtn">Fill & Submit</button>
      <button class="btn btn-secondary" id="disconnectBtn">Disconnect</button>
    </div>

    <p class="info" id="message"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
