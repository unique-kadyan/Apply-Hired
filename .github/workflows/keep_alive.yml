name: Keep Render Instance Alive

on:
  schedule:
    - cron: "*/5 * * * *"   # fires every 5 min; loop inside pings every 45s
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health every 45 seconds
        run: |
          URL="https://apply-hired.onrender.com/health"
          for i in $(seq 1 7); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$URL")
            echo "Ping $i → $STATUS"
            if [ $i -lt 7 ]; then
              sleep 45
            fi
          done
