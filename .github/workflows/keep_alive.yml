name: Keep Render Instance Alive (Manual / Backup)

# NOTE: Primary keep-alive is cron-job.org pinging /health every 1 minute.
# This workflow is a manual backup trigger only — GitHub Actions scheduled
# crons are NOT reliable (can be delayed 15+ min by GitHub under load).
#
# Setup cron-job.org (free, 1-min intervals):
#   1. Sign up at https://cron-job.org
#   2. Create job → URL: https://<your-app>.onrender.com/health
#   3. Interval: every 1 minute
#   4. Done — no secrets or tokens needed.

on:
  workflow_dispatch:   # manual trigger only

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "${{ secrets.RENDER_APP_URL }}/health")
          echo "Response: $STATUS"
