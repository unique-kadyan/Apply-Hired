name: CI — Lint · Security · Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. Syntax & Import Validation
  # ─────────────────────────────────────────────
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all Python files
        run: |
          find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./__pycache__/*" \
            | xargs python -m py_compile
          echo "All .py files compiled successfully"

  # ─────────────────────────────────────────────
  # 2. Linting (ruff — fast, drop-in for flake8)
  # ─────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff lint
        run: |
          ruff check . \
            --ignore E501 \
            --exclude __pycache__,frontend \
            --output-format github

      - name: Check import sorting (isort-compatible)
        run: |
          ruff check . --select I \
            --exclude __pycache__,frontend \
            --output-format github

  # ─────────────────────────────────────────────
  # 3. Security Scan (bandit)
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit security scan
        run: |
          bandit -r . \
            --exclude ./.git,./frontend,./uploads,./data \
            --skip B101,B603,B607 \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r . \
            --exclude ./.git,./frontend,./uploads,./data \
            --skip B101,B603,B607 \
            --severity-level medium \
            --confidence-level medium

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ─────────────────────────────────────────────
  # 4. Dependency Vulnerability Audit (pip-audit)
  # ─────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known CVEs
        run: |
          pip-audit \
            --requirement requirements.txt \
            --output json \
            --format json > pip-audit-report.json || true
          pip-audit \
            --requirement requirements.txt

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  # ─────────────────────────────────────────────
  # 5. Ship-Readiness Gate
  # ─────────────────────────────────────────────
  ship-gate:
    name: Ship Gate
    runs-on: ubuntu-latest
    needs: [syntax-check, lint, security-scan, dependency-audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Flask app can be imported
        env:
          SECRET_KEY: ci-test-secret
          MONGO_URI: mongodb://localhost:27017/test
          FLASK_DEBUG: "1"
        run: |
          python - <<'EOF'
          import os, sys
          # Patch pymongo so the app module can be imported without a live DB
          import unittest.mock as mock
          with mock.patch("pymongo.MongoClient") as mc:
              mc.return_value.__getitem__ = lambda s, k: mock.MagicMock()
              try:
                  from app import create_app
                  print("✅  Flask app imported successfully")
              except Exception as e:
                  print(f"❌  Import failed: {e}", file=sys.stderr)
                  sys.exit(1)
          EOF

      - name: Verify all route blueprints are present
        env:
          SECRET_KEY: ci-test-secret
          MONGO_URI: mongodb://localhost:27017/test
        run: |
          python - <<'EOF'
          import importlib, sys
          import unittest.mock as mock

          blueprints = [
              "routes.auth",
              "routes.config_routes",
              "routes.profile",
              "routes.jobs",
              "routes.search",
              "routes.payment",
              "routes.gmail",
              "routes.events",
          ]
          failed = []
          with mock.patch("pymongo.MongoClient") as mc:
              mc.return_value.__getitem__ = lambda s, k: mock.MagicMock()
              for bp in blueprints:
                  try:
                      importlib.import_module(bp)
                      print(f"  ✅  {bp}")
                  except ImportError as e:
                      print(f"  ❌  {bp}: {e}", file=sys.stderr)
                      failed.append(bp)
          if failed:
              sys.exit(1)
          EOF

      - name: All checks passed — ready to ship
        run: echo "🚀 Ship gate passed. All validations succeeded."
